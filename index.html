<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>شات عام | باسم فقط</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #1e293b, #0f172a);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 1rem;
        }

        .container {
            width: 100%;
            max-width: 900px;
            height: 90vh;
            background: white;
            border-radius: 1.5rem;
            box-shadow: 0 20px 35px rgba(0,0,0,0.2);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .chat-header {
            background: #0f172a;
            color: white;
            padding: 1rem 1.5rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
        }

        h1 {
            font-size: 1.3rem;
        }

        .user-info {
            display: flex;
            gap: 12px;
            align-items: center;
        }

        #userNameDisplay {
            font-weight: bold;
            background: #334155;
            padding: 0.3rem 0.8rem;
            border-radius: 2rem;
            font-size: 0.85rem;
        }

        .btn-logout {
            background: #f56565;
            color: white;
            border: none;
            padding: 0.4rem 1rem;
            border-radius: 2rem;
            cursor: pointer;
        }

        .online-users {
            background: #e2e8f0;
            padding: 0.5rem 1.5rem;
            font-size: 0.85rem;
        }

        .messages-area {
            flex: 1;
            overflow-y: auto;
            padding: 1rem 1.5rem;
            display: flex;
            flex-direction: column;
            gap: 10px;
            background: #f8fafc;
        }

        .message {
            max-width: 80%;
            padding: 0.6rem 1rem;
            border-radius: 1rem;
            word-wrap: break-word;
        }

        .message.own {
            background: #3b82f6;
            color: white;
            align-self: flex-end;
        }

        .message.other {
            background: white;
            color: #1e293b;
            align-self: flex-start;
            box-shadow: 0 1px 2px rgba(0,0,0,0.1);
        }

        .message .sender {
            font-size: 0.7rem;
            font-weight: bold;
            margin-bottom: 0.2rem;
        }

        .message .time {
            font-size: 0.65rem;
            opacity: 0.7;
            margin-top: 0.2rem;
            text-align: left;
        }

        .message.system {
            background: #cbd5e1;
            color: #1e293b;
            align-self: center;
            font-size: 0.8rem;
        }

        .input-area {
            display: flex;
            gap: 10px;
            padding: 1rem 1.5rem;
            background: white;
            border-top: 1px solid #e2e8f0;
        }

        #messageInput {
            flex: 1;
            padding: 0.8rem 1rem;
            border: 1px solid #cbd5e1;
            border-radius: 2rem;
            outline: none;
        }

        #sendBtn {
            background: #3b82f6;
            color: white;
            padding: 0.8rem 1.5rem;
            border: none;
            border-radius: 2rem;
            cursor: pointer;
        }

        .login-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.6);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .login-card {
            background: white;
            padding: 2rem;
            border-radius: 1rem;
            text-align: center;
            width: 300px;
        }

        .login-card input {
            width: 100%;
            padding: 0.8rem;
            margin: 1rem 0;
            border: 1px solid #cbd5e1;
            border-radius: 2rem;
            text-align: center;
        }

        .login-card button {
            background: #3b82f6;
            color: white;
            border: none;
            padding: 0.6rem 1.5rem;
            border-radius: 2rem;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div class="container" id="chatContainer" style="display: none;">
        <div class="chat-header">
            <h1>💬 الشات العام</h1>
            <div class="user-info">
                <span id="userNameDisplay"></span>
                <button id="logoutBtn" class="btn-logout">🚪 خروج</button>
            </div>
        </div>
        <div class="online-users">🟢 متصلون: <span id="onlineCount">0</span></div>
        <div class="messages-area" id="messagesArea">
            <div class="message system">✨ مرحباً بك في الشات العام</div>
        </div>
        <div class="input-area">
            <input type="text" id="messageInput" placeholder="اكتب رسالتك..." disabled>
            <button id="sendBtn" disabled>📤 إرسال</button>
        </div>
    </div>

    <div id="loginOverlay" class="login-overlay">
        <div class="login-card">
            <h2>💬 أدخل اسمك</h2>
            <input type="text" id="usernameInput" placeholder="اسم المستخدم" maxlength="20">
            <button id="enterBtn">دخول</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-auth.js";
        import { getFirestore, collection, addDoc, query, orderBy, onSnapshot, serverTimestamp, limit } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-firestore.js";
        import { getDatabase, ref, set, onDisconnect, onValue } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyA74xI6RlWmOJSeE472TVMiGz2dC9rzbSU",
            authDomain: "tryy12345678.firebaseapp.com",
            databaseURL: "https://tryy12345678-default-rtdb.firebaseio.com",
            projectId: "tryy12345678",
            storageBucket: "tryy12345678.firebasestorage.app",
            messagingSenderId: "924494362795",
            appId: "1:924494362795:web:340d90c2e67a8e31139fee"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const rtdb = getDatabase(app);

        let currentUser = null;
        let currentDisplayName = "";

        const chatContainer = document.getElementById('chatContainer');
        const loginOverlay = document.getElementById('loginOverlay');
        const userNameDisplay = document.getElementById('userNameDisplay');
        const logoutBtn = document.getElementById('logoutBtn');
        const messageInput = document.getElementById('messageInput');
        const sendBtn = document.getElementById('sendBtn');
        const messagesArea = document.getElementById('messagesArea');
        const onlineCountSpan = document.getElementById('onlineCount');
        const enterBtn = document.getElementById('enterBtn');
        const usernameInput = document.getElementById('usernameInput');

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function scrollToBottom() {
            messagesArea.scrollTop = messagesArea.scrollHeight;
        }

        function loadMessages() {
            const q = query(collection(db, 'messages'), orderBy('timestamp', 'asc'), limit(100));
            onSnapshot(q, (snapshot) => {
                const systemMsgs = messagesArea.querySelectorAll('.system');
                messagesArea.innerHTML = '';
                systemMsgs.forEach(msg => messagesArea.appendChild(msg));
                snapshot.forEach(doc => {
                    const data = doc.data();
                    const div = document.createElement('div');
                    div.className = `message ${data.userId === currentUser?.uid ? 'own' : 'other'}`;
                    const time = data.timestamp?.toDate() || new Date();
                    const timeStr = `${time.getHours().toString().padStart(2,'0')}:${time.getMinutes().toString().padStart(2,'0')}`;
                    div.innerHTML = `<div class="sender">${escapeHtml(data.userName)}</div><div>${escapeHtml(data.text)}</div><div class="time">${timeStr}</div>`;
                    messagesArea.appendChild(div);
                });
                scrollToBottom();
            });
        }

        async function sendMessage() {
            if (!currentUser || !messageInput.value.trim()) return;
            try {
                await addDoc(collection(db, 'messages'), {
                    text: messageInput.value.trim(),
                    userId: currentUser.uid,
                    userName: currentDisplayName,
                    timestamp: serverTimestamp()
                });
                messageInput.value = '';
            } catch(e) { console.error(e); }
        }

        function updateOnlineStatus(user, displayName) {
            if (!user) return;
            const userStatusRef = ref(rtdb, `users/${user.uid}`);
            const connectedRef = ref(rtdb, '.info/connected');
            onValue(connectedRef, (snap) => {
                if (snap.val() === true) {
                    set(userStatusRef, { displayName: displayName, online: true, lastSeen: Date.now() });
                    onDisconnect(userStatusRef).set({ displayName: displayName, online: false, lastSeen: Date.now() });
                }
            });
            const usersRef = ref(rtdb, 'users');
            onValue(usersRef, (snapshot) => {
                let online = 0;
                snapshot.forEach(child => { if (child.val().online === true) online++; });
                onlineCountSpan.textContent = online;
            });
        }

        enterBtn.addEventListener('click', async () => {
            const name = usernameInput.value.trim();
            if (!name) return alert("يرجى إدخال اسمك");
            try {
                const userCred = await signInAnonymously(auth);
                currentUser = userCred.user;
                currentDisplayName = name;
                userNameDisplay.textContent = name;
                chatContainer.style.display = 'flex';
                loginOverlay.style.display = 'none';
                messageInput.disabled = false;
                sendBtn.disabled = false;
                loadMessages();
                updateOnlineStatus(currentUser, name);
            } catch(e) { alert("خطأ: " + e.message); }
        });

        logoutBtn.addEventListener('click', async () => {
            if (currentUser) {
                const userStatusRef = ref(rtdb, `users/${currentUser.uid}`);
                await set(userStatusRef, { displayName: currentDisplayName, online: false, lastSeen: Date.now() });
            }
            await signOut(auth);
            chatContainer.style.display = 'none';
            loginOverlay.style.display = 'flex';
            messageInput.disabled = true;
            sendBtn.disabled = true;
        });

        messageInput.addEventListener('keypress', (e) => { if(e.key === 'Enter') sendMessage(); });
        sendBtn.addEventListener('click', sendMessage);
    </script>
</body>
</html>
