<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, maximum-scale=1.0">
    <title>الأسد الملكي - 4K Ultra Realistic</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            touch-action: manipulation;
        }

        body {
            background: #0a0a0a;
            overflow: hidden;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            width: 100vw;
            height: 100vh;
            position: fixed;
        }

        .container {
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
        }

        .image-wrapper {
            position: relative;
            width: 100%;
            height: 100%;
            overflow: hidden;
            touch-action: none;
        }

        .lion-image {
            width: 100%;
            height: 100%;
            object-fit: cover;
            object-position: center 20%;
            filter: contrast(1.15) saturate(1.25) brightness(1.05) sharpness(1.2);
            transition: transform 0.3s cubic-bezier(0.25, 0.46, 0.45, 0.94);
            will-change: transform;
            -webkit-user-drag: none;
            user-select: none;
        }

        /* خصلات الشعر المتقدمة */
        .hair-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            overflow: hidden;
        }

        .hair-strand {
            position: absolute;
            pointer-events: none;
            opacity: 0.7;
            filter: blur(0.5px);
            border-radius: 50%;
            transform-origin: top center;
            will-change: transform;
        }

        /* خصلات الجانب الأيسر */
        .strand-l1 {
            top: 18%;
            left: 5%;
            width: 80px;
            height: 2px;
            background: linear-gradient(90deg, transparent 0%, #8B4513 30%, #D2691E 70%, transparent 100%);
            animation: swayWind1 2.5s ease-in-out infinite;
        }

        .strand-l2 {
            top: 28%;
            left: 2%;
            width: 100px;
            height: 1.5px;
            background: linear-gradient(90deg, transparent 0%, #CD853F 40%, #DEB887 80%, transparent 100%);
            animation: swayWind2 3.2s ease-in-out infinite;
            animation-delay: 0.5s;
        }

        .strand-l3 {
            top: 38%;
            left: 8%;
            width: 90px;
            height: 2px;
            background: linear-gradient(90deg, transparent 0%, #A0522D 30%, #D2691E 60%, transparent 100%);
            animation: swayWind3 2.8s ease-in-out infinite;
            animation-delay: 1s;
        }

        .strand-l4 {
            top: 48%;
            left: 3%;
            width: 85px;
            height: 1.8px;
            background: linear-gradient(90deg, transparent 0%, #8B4513 35%, #CD853F 75%, transparent 100%);
            animation: swayWind1 3.5s ease-in-out infinite;
            animation-delay: 1.5s;
        }

        .strand-l5 {
            top: 58%;
            left: 6%;
            width: 75px;
            height: 2px;
            background: linear-gradient(90deg, transparent 0%, #D2691E 40%, #DEB887 80%, transparent 100%);
            animation: swayWind2 2.2s ease-in-out infinite;
            animation-delay: 0.8s;
        }

        /* خصلات الجانب الأيمن */
        .strand-r1 {
            top: 20%;
            right: 5%;
            width: 85px;
            height: 2px;
            background: linear-gradient(90deg, transparent 0%, #8B4513 30%, #D2691E 70%, transparent 100%);
            animation: swayWind1 2.7s ease-in-out infinite reverse;
        }

        .strand-r2 {
            top: 30%;
            right: 2%;
            width: 95px;
            height: 1.5px;
            background: linear-gradient(90deg, transparent 0%, #CD853F 40%, #DEB887 80%, transparent 100%);
            animation: swayWind3 3.0s ease-in-out infinite reverse;
            animation-delay: 0.6s;
        }

        .strand-r3 {
            top: 40%;
            right: 7%;
            width: 80px;
            height: 2px;
            background: linear-gradient(90deg, transparent 0%, #A0522D 30%, #D2691E 60%, transparent 100%);
            animation: swayWind2 3.3s ease-in-out infinite reverse;
            animation-delay: 1.2s;
        }

        .strand-r4 {
            top: 50%;
            right: 4%;
            width: 90px;
            height: 1.8px;
            background: linear-gradient(90deg, transparent 0%, #8B4513 35%, #CD853F 75%, transparent 100%);
            animation: swayWind1 2.9s ease-in-out infinite reverse;
            animation-delay: 0.4s;
        }

        .strand-r5 {
            top: 60%;
            right: 6%;
            width: 70px;
            height: 2px;
            background: linear-gradient(90deg, transparent 0%, #D2691E 40%, #DEB887 80%, transparent 100%);
            animation: swayWind3 2.6s ease-in-out infinite reverse;
            animation-delay: 1.8s;
        }

        /* خصلات إضافية للعمق */
        .strand-deep1 {
            top: 25%;
            left: 12%;
            width: 60px;
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(139,69,19,0.5), transparent);
            animation: swayWind2 4s ease-in-out infinite;
            opacity: 0.4;
        }

        .strand-deep2 {
            top: 45%;
            right: 10%;
            width: 65px;
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(205,133,63,0.5), transparent);
            animation: swayWind1 3.8s ease-in-out infinite reverse;
            opacity: 0.4;
        }

        @keyframes swayWind1 {
            0%, 100% { transform: rotate(0deg) translateX(0) scaleX(1); }
            25% { transform: rotate(4deg) translateX(8px) scaleX(1.05); }
            50% { transform: rotate(0deg) translateX(0) scaleX(1); }
            75% { transform: rotate(-3deg) translateX(-6px) scaleX(0.95); }
        }

        @keyframes swayWind2 {
            0%, 100% { transform: rotate(0deg) translateX(0) scaleY(1); }
            33% { transform: rotate(-5deg) translateX(-10px) scaleY(1.1); }
            66% { transform: rotate(3deg) translateX(6px) scaleY(0.9); }
        }

        @keyframes swayWind3 {
            0%, 100% { transform: rotate(0deg) translateX(0); }
            20% { transform: rotate(6deg) translateX(12px); }
            40% { transform: rotate(-2deg) translateX(-4px); }
            60% { transform: rotate(4deg) translateX(8px); }
            80% { transform: rotate(-5deg) translateX(-10px); }
        }

        /* تأثير الضباب والإضاءة */
        .atmosphere {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            background: 
                radial-gradient(ellipse at 30% 20%, rgba(255,200,100,0.15) 0%, transparent 50%),
                radial-gradient(ellipse at 70% 80%, rgba(255,150,50,0.08) 0%, transparent 40%);
            mix-blend-mode: overlay;
            animation: lightShift 8s ease-in-out infinite;
        }

        @keyframes lightShift {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.8; }
        }

        /* جسيمات عائمة */
        .particle {
            position: absolute;
            background: rgba(255, 220, 150, 0.4);
            border-radius: 50%;
            pointer-events: none;
            animation: float linear infinite;
            will-change: transform;
        }

        @keyframes float {
            0% {
                transform: translateY(100vh) translateX(0) scale(0);
                opacity: 0;
            }
            10% { opacity: 1; transform: scale(1); }
            90% { opacity: 1; }
            100% {
                transform: translateY(-10vh) translateX(30px) scale(0.5);
                opacity: 0;
            }
        }

        /* معلومات */
        .info-overlay {
            position: absolute;
            bottom: 20px;
            left: 15px;
            color: rgba(255, 255, 255, 0.9);
            font-size: 12px;
            z-index: 10;
            background: rgba(0, 0, 0, 0.5);
            padding: 12px 18px;
            border-radius: 12px;
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.15);
            max-width: 200px;
        }

        .info-overlay h1 {
            font-size: 18px;
            margin-bottom: 4px;
            color: #FFD700;
            text-shadow: 0 2px 8px rgba(255, 215, 0, 0.4);
        }

        .info-overlay p {
            font-size: 11px;
            color: rgba(255, 255, 255, 0.7);
            line-height: 1.4;
        }

        .quality-badge {
            position: absolute;
            top: 20px;
            right: 15px;
            background: linear-gradient(135deg, #FFD700, #FF8C00);
            color: #000;
            padding: 8px 16px;
            border-radius: 20px;
            font-weight: bold;
            font-size: 13px;
            z-index: 10;
            box-shadow: 0 4px 20px rgba(255, 215, 0, 0.4);
        }

        .touch-hint {
            position: absolute;
            bottom: 20px;
            right: 15px;
            color: rgba(255, 255, 255, 0.6);
            font-size: 11px;
            z-index: 10;
            background: rgba(0, 0, 0, 0.4);
            padding: 8px 14px;
            border-radius: 20px;
            backdrop-filter: blur(10px);
            animation: pulse 2s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 0.6; }
            50% { opacity: 1; }
        }

        /* تأثير التنفس */
        .breathing {
            animation: breathe 5s ease-in-out infinite;
        }

        @keyframes breathe {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.03); }
        }

        /* تأثير اللمعان على العيون */
        .eye-glow {
            position: absolute;
            top: 35%;
            left: 50%;
            transform: translateX(-50%);
            width: 60%;
            height: 8%;
            background: radial-gradient(ellipse, rgba(255,215,0,0.1) 0%, transparent 70%);
            pointer-events: none;
            animation: eyeShine 4s ease-in-out infinite;
            filter: blur(8px);
        }

        @keyframes eyeShine {
            0%, 100% { opacity: 0.3; }
            50% { opacity: 0.7; }
        }

        /* شريط التحميل */
        .loader {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            transition: opacity 0.5s;
        }

        .loader.hidden {
            opacity: 0;
            pointer-events: none;
        }

        .loader-text {
            color: #FFD700;
            font-size: 18px;
            animation: loaderPulse 1.5s ease-in-out infinite;
        }

        @keyframes loaderPulse {
            0%, 100% { opacity: 0.5; }
            50% { opacity: 1; }
        }
    </style>
</head>
<body>
    <!-- شاشة التحميل -->
    <div class="loader" id="loader">
        <div class="loader-text">جاري تحميل الأسد الملكي...</div>
    </div>

    <div class="container">
        <div class="image-wrapper" id="wrapper">
            <img src="https://img.freepik.com/premium-photo/strength-beauty-lion-captured-8k-realistic-detail_1110513-11596.jpg?semt=ais_hybrid&w=1920&q=95" 
                 alt="أسد ملكي بتفاصيل فائقة الواقعية" 
                 class="lion-image breathing" 
                 id="lionImg"
                 loading="eager">
            
            <!-- خصلات الشعر -->
            <div class="hair-container" id="hairContainer">
                <div class="hair-strand strand-l1"></div>
                <div class="hair-strand strand-l2"></div>
                <div class="hair-strand strand-l3"></div>
                <div class="hair-strand strand-l4"></div>
                <div class="hair-strand strand-l5"></div>
                <div class="hair-strand strand-r1"></div>
                <div class="hair-strand strand-r2"></div>
                <div class="hair-strand strand-r3"></div>
                <div class="hair-strand strand-r4"></div>
                <div class="hair-strand strand-r5"></div>
                <div class="hair-strand strand-deep1"></div>
                <div class="hair-strand strand-deep2"></div>
            </div>
            
            <!-- لمعان العيون -->
            <div class="eye-glow"></div>
            
            <!-- طبقة الجو -->
            <div class="atmosphere"></div>
            
            <!-- معلومات -->
            <div class="info-overlay">
                <h1>الأسد الملكي</h1>
                <p>صورة فائقة الوضوح 4K مع تأثيرات حركية واقعية وتفاعل لمس</p>
            </div>
            
            <div class="quality-badge">4K ULTRA HD</div>
            <div class="touch-hint" id="touchHint">المس الشاشة للتفاعل</div>
        </div>
    </div>

    <script>
        // إخفاء شاشة التحميل
        window.addEventListener('load', () => {
            setTimeout(() => {
                document.getElementById('loader').classList.add('hidden');
            }, 1000);
        });

        // إنشاء جسيمات عائمة
        function createParticles() {
            const wrapper = document.getElementById('wrapper');
            for (let i = 0; i < 15; i++) {
                const particle = document.createElement('div');
                particle.className = 'particle';
                const size = Math.random() * 2.5 + 0.5;
                particle.style.width = size + 'px';
                particle.style.height = size + 'px';
                particle.style.left = Math.random() * 100 + '%';
                particle.style.animationDuration = (Math.random() * 8 + 8) + 's';
                particle.style.animationDelay = Math.random() * 8 + 's';
                wrapper.appendChild(particle);
            }
        }

        // متغيرات التفاعل
        const wrapper = document.getElementById('wrapper');
        const lionImg = document.getElementById('lionImg');
        const hairContainer = document.getElementById('hairContainer');
        const touchHint = document.getElementById('touchHint');
        let isTouching = false;
        let touchStartX = 0;
        let touchStartY = 0;
        let currentX = 0;
        let currentY = 0;

        // تفاعل اللمس (Touch)
        wrapper.addEventListener('touchstart', (e) => {
            isTouching = true;
            touchHint.style.opacity = '0';
            const touch = e.touches[0];
            touchStartX = touch.clientX;
            touchStartY = touch.clientY;
            
            // اهتزاز خفيف (إذا كان مدعوماً)
            if (navigator.vibrate) navigator.vibrate(10);
        }, { passive: true });

        wrapper.addEventListener('touchmove', (e) => {
            if (!isTouching) return;
            e.preventDefault();
            
            const touch = e.touches[0];
            const deltaX = (touch.clientX - touchStartX) / 10;
            const deltaY = (touch.clientY - touchStartY) / 10;
            
            currentX = deltaX;
            currentY = deltaY;
            
            // تحريك الصورة
            lionImg.style.transform = `scale(1.1) translate(${-deltaX}px, ${-deltaY}px)`;
            
            // تحريك خصلات الشعر بشكل مكثف
            const strands = document.querySelectorAll('.hair-strand');
            strands.forEach((strand, index) => {
                const intensity = (index % 2 === 0) ? 1.5 : -1.5;
                const delay = index * 0.1;
                strand.style.transform = `
                    rotate(${deltaX * intensity}deg) 
                    translateX(${deltaX * 3}px) 
                    translateY(${deltaY * 2}px)
                    scaleX(${1 + Math.abs(deltaX) * 0.01})
                `;
                strand.style.transition = `transform ${0.1 + delay}s ease-out`;
            });
            
            // تأثير الإضاءة الديناميكية
            const atmosphere = document.querySelector('.atmosphere');
            const lightX = (touch.clientX / window.innerWidth) * 100;
            const lightY = (touch.clientY / window.innerHeight) * 100;
            atmosphere.style.background = `
                radial-gradient(ellipse at ${lightX}% ${lightY}%, rgba(255,200,100,0.2) 0%, transparent 50%),
                radial-gradient(ellipse at ${100-lightX}% ${100-lightY}%, rgba(255,150,50,0.1) 0%, transparent 40%)
            `;
        }, { passive: false });

        wrapper.addEventListener('touchend', () => {
            isTouching = false;
            
            // العودة التدريجية للوضع الطبيعي
            lionImg.style.transition = 'transform 0.8s cubic-bezier(0.25, 0.46, 0.45, 0.94)';
            lionImg.style.transform = 'scale(1) translate(0, 0)';
            
            const strands = document.querySelectorAll('.hair-strand');
            strands.forEach((strand, index) => {
                strand.style.transition = `transform ${0.5 + index * 0.05}s ease-out`;
                strand.style.transform = 'rotate(0deg) translateX(0) translateY(0) scaleX(1)';
            });
            
            setTimeout(() => {
                lionImg.style.transition = 'transform 0.3s cubic-bezier(0.25, 0.46, 0.45, 0.94)';
                strands.forEach(strand => {
                    strand.style.transition = '';
                    strand.style.transform = '';
                });
            }, 800);
        });

        // تفاعل الماوس (للأجهزة المكتبية)
        wrapper.addEventListener('mousemove', (e) => {
            const x = (window.innerWidth / 2 - e.clientX) / 30;
            const y = (window.innerHeight / 2 - e.clientY) / 30;
            
            lionImg.style.transform = `scale(1.05) translate(${x}px, ${y}px)`;
            
            const strands = document.querySelectorAll('.hair-strand');
            strands.forEach((strand, index) => {
                const intensity = (index % 2 === 0) ? 1.2 : -1.2;
                strand.style.transform = `
                    rotate(${x * intensity}deg) 
                    translateX(${x * 2}px)
                    scaleX(${1 + Math.abs(x) * 0.005})
                `;
            });
        });

        wrapper.addEventListener('mouseleave', () => {
            lionImg.style.transform = 'scale(1) translate(0, 0)';
            const strands = document.querySelectorAll('.hair-strand');
            strands.forEach(strand => {
                strand.style.transform = '';
            });
        });

        // تفاعل النقر المزدوج (تكبير)
        let lastTap = 0;
        wrapper.addEventListener('touchend', (e) => {
            const currentTime = new Date().getTime();
            const tapLength = currentTime - lastTap;
            if (tapLength < 300 && tapLength > 0) {
                // نقر مزدوج
                lionImg.style.transform = 'scale(1.3)';
                setTimeout(() => {
                    lionImg.style.transform = 'scale(1)';
                }, 500);
                if (navigator.vibrate) navigator.vibrate([50, 50]);
            }
            lastTap = currentTime;
        });

        // تفاعل الإمالة (Gyroscope) للهواتف
        if (window.DeviceOrientationEvent) {
            window.addEventListener('deviceorientation', (e) => {
                if (isTouching) return; // لا تتداخل مع اللمس
                
                const tiltX = e.gamma || 0; // إمالة يمين/يسار
                const tiltY = e.beta || 0;  // إمالة أمام/خلف
                
                const moveX = tiltX * 0.5;
                const moveY = tiltY * 0.3;
                
                lionImg.style.transform = `scale(1.02) translate(${moveX}px, ${moveY}px)`;
                
                // خصلات الشعر تتأثر بالإمالة
                const strands = document.querySelectorAll('.hair-strand');
                strands.forEach((strand, index) => {
                    const intensity = (index % 2 === 0) ? 0.8 : -0.8;
                    strand.style.transform = `rotate(${tiltX * intensity}deg) translateX(${tiltX * 1.5}px)`;
                });
            });
        }

        // تغير الإضاءة العشوائي
        setInterval(() => {
            const atmosphere = document.querySelector('.atmosphere');
            const opacity = 0.8 + Math.random() * 0.2;
            atmosphere.style.opacity = opacity;
        }, 3000);

        // إنشاء الجسيمات
        createParticles();

        // منع التمرير الافتراضي
        document.body.addEventListener('touchmove', (e) => {
            e.preventDefault();
        }, { passive: false });
    </script>
</body>
</html>
