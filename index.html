<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ظِلال - منصة القصص التفاعلية</title>
    <link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Cairo:wght@300;400;600;700&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Cairo', sans-serif;
            background: #000;
            color: #fff;
            height: 100vh;
            overflow: hidden;
        }

        /* Login Overlay */
        .login-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(135deg, #0a0a0a, #1a1a2e);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 2000;
        }

        .login-card {
            background: rgba(20, 20, 40, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 30px;
            padding: 50px;
            text-align: center;
            max-width: 450px;
            width: 90%;
            border: 1px solid rgba(255,255,255,0.1);
        }

        .login-card h1 {
            font-family: 'Amiri', serif;
            font-size: 3rem;
            margin-bottom: 10px;
            color: gold;
        }

        .google-btn {
            background: #fff;
            color: #333;
            border: none;
            padding: 15px 30px;
            border-radius: 50px;
            font-size: 1.1rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            width: 100%;
            font-weight: 600;
            margin-bottom: 20px;
        }

        .admin-toggle {
            margin-top: 20px;
            font-size: 0.85rem;
            color: #666;
            cursor: pointer;
        }

        .admin-login-panel {
            display: none;
            margin-top: 20px;
            padding-top: 20px;
            border-top: 1px solid #333;
        }

        .admin-login-panel input {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            background: #111;
            border: 1px solid #333;
            border-radius: 10px;
            color: #fff;
            text-align: center;
        }

        .admin-login-panel button {
            background: gold;
            color: #000;
            padding: 12px;
            border: none;
            border-radius: 10px;
            width: 100%;
            cursor: pointer;
            font-weight: bold;
        }

        /* Main App */
        .main-app {
            display: none;
            height: 100vh;
            flex-direction: column;
        }

        .header {
            background: #111;
            padding: 15px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #222;
        }

        .logo {
            font-family: 'Amiri', serif;
            font-size: 1.8rem;
            color: gold;
        }

        .user-info {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .admin-badge {
            background: gold;
            color: #000;
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: bold;
        }

        .logout-btn {
            background: transparent;
            border: 1px solid #ff4444;
            color: #ff4444;
            padding: 8px 20px;
            border-radius: 8px;
            cursor: pointer;
        }

        .main-layout {
            display: flex;
            flex: 1;
            overflow: hidden;
        }

        .sidebar {
            width: 320px;
            background: #0a0a0a;
            border-left: 1px solid #222;
            display: flex;
            flex-direction: column;
            overflow-y: auto;
        }

        .stories-list {
            flex: 1;
            padding: 15px;
        }

        .story-item {
            padding: 15px;
            margin-bottom: 8px;
            background: #111;
            border-radius: 12px;
            cursor: pointer;
            transition: 0.3s;
        }

        .story-item:hover, .story-item.active {
            background: #1a1a1a;
            border-right: 3px solid gold;
        }

        .admin-panel-btn {
            background: #222;
            color: gold;
            border: 1px solid gold;
            padding: 12px;
            margin: 15px;
            border-radius: 10px;
            cursor: pointer;
            font-weight: bold;
        }

        .content-area {
            flex: 1;
            overflow-y: auto;
            padding: 30px;
        }

        .reader-view {
            max-width: 900px;
            margin: 0 auto;
        }

        .story-title-main {
            font-family: 'Amiri', serif;
            font-size: 2rem;
            margin-bottom: 20px;
        }

        .story-content {
            font-family: 'Amiri', serif;
            font-size: 1.1rem;
            line-height: 1.8;
            margin: 30px 0;
        }

        .edit-story-btn, .save-story-btn {
            background: gold;
            color: #000;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            margin-left: 10px;
            cursor: pointer;
        }

        .story-textarea {
            width: 100%;
            min-height: 400px;
            background: #111;
            border: 1px solid #333;
            color: #fff;
            padding: 15px;
            font-family: 'Amiri', serif;
            font-size: 1rem;
            line-height: 1.8;
            border-radius: 12px;
        }

        /* Feedback Section */
        .feedback-section {
            margin-top: 50px;
            padding-top: 30px;
            border-top: 1px solid #333;
        }

        .feedback-title {
            font-size: 1.3rem;
            margin-bottom: 20px;
            color: gold;
        }

        .feedback-input-area {
            display: flex;
            gap: 10px;
            margin-bottom: 25px;
        }

        .feedback-input {
            flex: 1;
            background: #111;
            border: 1px solid #333;
            border-radius: 12px;
            padding: 12px;
            color: #fff;
            font-family: 'Cairo', sans-serif;
        }

        .send-feedback-btn {
            background: gold;
            color: #000;
            border: none;
            padding: 12px 25px;
            border-radius: 12px;
            cursor: pointer;
            font-weight: bold;
        }

        .feedback-list {
            max-height: 300px;
            overflow-y: auto;
        }

        .feedback-item {
            background: #0a0a0a;
            padding: 15px;
            border-radius: 12px;
            margin-bottom: 10px;
            border-right: 3px solid gold;
        }

        .feedback-user {
            font-weight: bold;
            color: gold;
            margin-bottom: 8px;
        }

        .feedback-text {
            color: #ddd;
            line-height: 1.5;
        }

        .feedback-time {
            font-size: 0.7rem;
            color: #666;
            margin-top: 8px;
        }

        .delete-feedback-btn {
            background: #ff4444;
            color: #fff;
            border: none;
            padding: 5px 12px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.7rem;
            float: left;
        }

        /* Admin Dashboard */
        .admin-dashboard {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.95);
            z-index: 1500;
            overflow-y: auto;
            padding: 30px;
        }

        .dashboard-container {
            max-width: 1200px;
            margin: 0 auto;
            background: #0a0a0a;
            border-radius: 20px;
            padding: 30px;
        }

        .dashboard-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            padding-bottom: 20px;
            border-bottom: 1px solid #333;
        }

        .close-dashboard {
            background: #ff4444;
            border: none;
            color: #fff;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
        }

        .users-table, .feedback-table {
            width: 100%;
            border-collapse: collapse;
            margin-bottom: 30px;
        }

        .users-table th, .feedback-table th {
            text-align: right;
            padding: 12px;
            background: #111;
            border-bottom: 1px solid #333;
        }

        .users-table td, .feedback-table td {
            padding: 12px;
            border-bottom: 1px solid #222;
        }

        .ban-btn, .delete-feedback-admin {
            background: #ff4444;
            color: #fff;
            border: none;
            padding: 5px 12px;
            border-radius: 6px;
            cursor: pointer;
        }

        .unban-btn {
            background: #44ff44;
            color: #000;
        }

        .add-story-dashboard {
            background: #222;
            padding: 20px;
            border-radius: 12px;
            margin-top: 20px;
        }

        .add-story-dashboard input, .add-story-dashboard textarea {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            background: #111;
            border: 1px solid #333;
            color: #fff;
            border-radius: 8px;
        }

        .add-story-dashboard textarea {
            min-height: 150px;
        }
    </style>
</head>
<body>

<!-- Login Screen -->
<div class="login-overlay" id="loginOverlay">
    <div class="login-card">
        <h1>ظِلال</h1>
        <p>عالم القصص الغامضة</p>
        <button class="google-btn" onclick="loginWithGoogle()">
            🚀 تسجيل الدخول بحساب Google
        </button>
        <div class="admin-toggle" onclick="toggleAdminLogin()">
            🔐 دخول الأدمن
        </div>
        <div class="admin-login-panel" id="adminLoginPanel">
            <input type="text" id="adminCode" placeholder="الكود السري">
            <input type="password" id="adminPass" placeholder="الرقم السري">
            <button onclick="verifyAdmin()">تأكيد دخول الأدمن</button>
        </div>
    </div>
</div>

<!-- Main App -->
<div class="main-app" id="mainApp">
    <div class="header">
        <div class="logo">ظِلال</div>
        <div class="user-info">
            <span id="userNameDisplay"></span>
            <span class="admin-badge" id="adminBadge" style="display:none;">👑 أدمن</span>
            <button class="logout-btn" onclick="logout()">خروج</button>
        </div>
    </div>
    
    <div class="main-layout">
        <div class="sidebar">
            <div class="stories-list" id="storiesList"></div>
            <button class="admin-panel-btn" id="adminPanelBtn" onclick="openAdminDashboard()" style="display:none;">⚙ لوحة التحكم</button>
        </div>
        
        <div class="content-area" id="contentArea">
            <div class="reader-view" id="readerView">
                <div style="text-align:center;padding:50px;">📖 اختر قصة من القائمة</div>
            </div>
        </div>
    </div>
</div>

<!-- Admin Dashboard -->
<div class="admin-dashboard" id="adminDashboard">
    <div class="dashboard-container">
        <div class="dashboard-header">
            <h2>⚙ لوحة تحكم الأدمن</h2>
            <button class="close-dashboard" onclick="closeAdminDashboard()">✖ إغلاق</button>
        </div>
        
        <h3>👥 المستخدمين المسجلين</h3>
        <table class="users-table" id="usersTable">
            <thead>
                <tr><th>البريد الإلكتروني</th><th>الاسم</th><th>الحالة</th><th>إجراء</th></tr>
            </thead>
            <tbody id="usersTableBody"></tbody>
        </table>
        
        <h3>💬 آراء المستخدمين</h3>
        <table class="feedback-table" id="feedbackTableAdmin">
            <thead><tr><th>المستخدم</th><th>الرأي</th><th>التاريخ</th><th>حذف</th></tr></thead>
            <tbody id="feedbackTableBody"></tbody>
        </table>
        
        <h3>📝 إضافة قصة جديدة</h3>
        <div class="add-story-dashboard">
            <input type="text" id="newStoryTitle" placeholder="عنوان القصة">
            <textarea id="newStoryContent" placeholder="محتوى القصة..."></textarea>
            <textarea id="newStoryPreview" placeholder="مقدمة قصيرة..."></textarea>
            <button onclick="addNewStory()" style="background:gold;color:#000;padding:12px;border:none;border-radius:8px;cursor:pointer;">+ إضافة قصة</button>
        </div>
    </div>
</div>

<script>
    // Firebase Config (ضع إعداداتك هنا)
    const firebaseConfig = {
        apiKey: "AIzaSyA74xI6RlWmOJSeE472TVMiGz2dC9rzbSU",
        authDomain: "tryy12345678.firebaseapp.com",
        databaseURL: "https://tryy12345678-default-rtdb.firebaseio.com",
        projectId: "tryy12345678",
        storageBucket: "tryy12345678.firebasestorage.app",
        messagingSenderId: "924494362795",
        appId: "1:924494362795:web:340d90c2e67a8e31139fee"
    };
    
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.database();
    
    // بيانات الأدمن
    const ADMIN_CODE = "mmkk#";
    const ADMIN_PASS = "6677#";
    
    let currentUser = null;
    let isAdmin = false;
    let currentStoryId = null;
    let isEditing = false;
    
    // القصص الافتراضية
    const defaultStories = {
        "story_1": {
            id: "story_1",
            title: "المرآة التي لا تعكس",
            content: "<p>في قديم الزمان... قصة المرآة</p>",
            preview: "قصة غامضة عن مرآة عجيبة"
        },
        "story_2": {
            id: "story_2",
            title: "الساعة الثالثة والثلث",
            content: "<p>كل ليلة تستيقظ...</p>",
            preview: "لغز الساعة الثالثة"
        }
    };
    
    // تهيئة قاعدة البيانات
    function initDatabase() {
        db.ref('stories').once('value', (snapshot) => {
            if (!snapshot.exists()) {
                db.ref('stories').set(defaultStories);
            }
        });
        db.ref('bannedUsers').once('value', (snapshot) => {
            if (!snapshot.exists()) {
                db.ref('bannedUsers').set([]);
            }
        });
    }
    
    // تسجيل دخول جوجل
    async function loginWithGoogle() {
        const provider = new firebase.auth.GoogleAuthProvider();
        try {
            const result = await auth.signInWithPopup(provider);
            const user = result.user;
            
            // التحقق من الحظر
            const bannedSnap = await db.ref('bannedUsers').once('value');
            const bannedList = bannedSnap.val() || [];
            if (bannedList.includes(user.email)) {
                alert("⚠️ لقد تم حظرك من الموقع!");
                await auth.signOut();
                return;
            }
            
            // حفظ المستخدم
            await db.ref('users/' + user.uid).set({
                email: user.email,
                name: user.displayName,
                photo: user.photoURL,
                lastLogin: Date.now()
            });
            
            currentUser = user;
            isAdmin = false;
            document.getElementById('adminBadge').style.display = 'none';
            document.getElementById('adminPanelBtn').style.display = 'none';
            document.getElementById('userNameDisplay').innerText = user.displayName;
            
            document.getElementById('loginOverlay').style.display = 'none';
            document.getElementById('mainApp').style.display = 'flex';
            
            loadStories();
            loadFeedbackForUser();
            
            // فتح أول قصة تلقائياً
            setTimeout(() => {
                const firstStoryId = localStorage.getItem('lastStory') || 'story_1';
                openStory(firstStoryId);
            }, 500);
            
        } catch(error) {
            console.error(error);
            alert("خطأ في تسجيل الدخول: " + error.message);
        }
    }
    
    // التحقق من الأدمن
    function verifyAdmin() {
        const code = document.getElementById('adminCode').value;
        const pass = document.getElementById('adminPass').value;
        
        if (code === ADMIN_CODE && pass === ADMIN_PASS) {
            isAdmin = true;
            document.getElementById('adminBadge').style.display = 'inline-block';
            document.getElementById('adminPanelBtn').style.display = 'block';
            alert("تم التحول إلى وضع الأدمن");
            closeAdminDashboard();
        } else {
            alert("الكود أو الرقم السري غير صحيح");
        }
    }
    
    // تحميل القصص
    function loadStories() {
        db.ref('stories').on('value', (snapshot) => {
            const stories = snapshot.val();
            const storiesList = document.getElementById('storiesList');
            if (stories) {
                storiesList.innerHTML = Object.values(stories).map(story => `
                    <div class="story-item ${currentStoryId === story.id ? 'active' : ''}" onclick="openStory('${story.id}')">
                        <div class="story-title-side">${story.title}</div>
                        <div class="story-preview-side">${story.preview.substring(0, 50)}...</div>
                    </div>
                `).join('');
            }
        });
    }
    
    // فتح قصة
    function openStory(storyId) {
        currentStoryId = storyId;
        localStorage.setItem('lastStory', storyId);
        
        db.ref('stories/' + storyId).once('value', (snapshot) => {
            const story = snapshot.val();
            if (story) {
                document.getElementById('readerView').innerHTML = `
                    <div class="story-title-main">${story.title}</div>
                    ${isAdmin ? `<button class="edit-story-btn" onclick="toggleEditMode()">✏️ تعديل القصة</button>` : ''}
                    <div id="storyContentDisplay" class="story-content">${story.content}</div>
                    <div id="editModeArea" style="display:none;">
                        <textarea id="editStoryTextarea" class="story-textarea">${story.content.replace(/<p>/g, '').replace(/<\/p>/g, '\n')}</textarea>
                        <button class="save-story-btn" onclick="saveStoryEdit()">💾 حفظ التعديلات</button>
                    </div>
                    
                    <!-- قسم الآراء -->
                    <div class="feedback-section">
                        <div class="feedback-title">💬 آراء القراء</div>
                        ${!isAdmin ? `
                        <div class="feedback-input-area">
                            <input type="text" id="feedbackInput" class="feedback-input" placeholder="اكتب رأيك في هذه القصة...">
                            <button class="send-feedback-btn" onclick="sendFeedback()">إرسال الرأي</button>
                        </div>
                        ` : ''}
                        <div class="feedback-list" id="feedbackList"></div>
                    </div>
                `;
                loadFeedbackForStory(storyId);
            }
        });
    }
    
    // تبديل وضع التعديل
    function toggleEditMode() {
        if (!isAdmin) return;
        const display = document.getElementById('storyContentDisplay');
        const editArea = document.getElementById('editModeArea');
        if (display.style.display !== 'none') {
            display.style.display = 'none';
            editArea.style.display = 'block';
        } else {
            display.style.display = 'block';
            editArea.style.display = 'none';
        }
    }
    
    // حفظ تعديل القصة
    async function saveStoryEdit() {
        const newContent = document.getElementById('editStoryTextarea').value;
        const formattedContent = newContent.split('\n').map(p => `<p>${p}</p>`).join('');
        await db.ref('stories/' + currentStoryId).update({
            content: formattedContent
        });
        alert("✅ تم حفظ التعديلات");
        openStory(currentStoryId);
    }
    
    // إرسال رأي
    async function sendFeedback() {
        const feedbackText = document.getElementById('feedbackInput').value;
        if (!feedbackText.trim()) {
            alert("الرجاء كتابة رأيك");
            return;
        }
        
        await db.ref('feedback').push({
            storyId: currentStoryId,
            storyTitle: (await db.ref('stories/' + currentStoryId).once('value')).val().title,
            userId: currentUser.uid,
            userName: currentUser.displayName,
            userEmail: currentUser.email,
            text: feedbackText,
            timestamp: Date.now(),
            isRead: false
        });
        
        document.getElementById('feedbackInput').value = '';
        alert("تم إرسال رأيك إلى الأدمن 📨");
    }
    
    // تحميل الآراء للقصة الحالية
    function loadFeedbackForStory(storyId) {
        db.ref('feedback').orderByChild('timestamp').on('value', (snapshot) => {
            const feedbacks = snapshot.val();
            const list = document.getElementById('feedbackList');
            if (feedbacks) {
                const storyFeedbacks = Object.entries(feedbacks)
                    .filter(([id, fb]) => fb.storyId === storyId)
                    .sort((a,b) => b[1].timestamp - a[1].timestamp);
                
                if (storyFeedbacks.length === 0) {
                    list.innerHTML = '<div style="text-align:center;color:#666;">لا توجد آراء بعد. كن أول من يكتب رأيه!</div>';
                } else {
                    list.innerHTML = storyFeedbacks.map(([id, fb]) => `
                        <div class="feedback-item">
                            <div class="feedback-user">${fb.userName}</div>
                            <div class="feedback-text">${fb.text}</div>
                            <div class="feedback-time">${new Date(fb.timestamp).toLocaleString('ar-EG')}</div>
                        </div>
                    `).join('');
                }
            }
        });
    }
    
    // تحميل الآراء للمستخدم العادي
    function loadFeedbackForUser() {
        // لا يحتاج المستخدم العادي لتحميل كل الآراء
    }
    
    // لوحة تحكم الأدمن
    async function openAdminDashboard() {
        if (!isAdmin) return;
        
        // تحميل المستخدمين
        const usersSnap = await db.ref('users').once('value');
        const users = usersSnap.val() || {};
        const bannedSnap = await db.ref('bannedUsers').once('value');
        const banned = bannedSnap.val() || [];
        
        const usersHtml = Object.entries(users).map(([id, user]) => `
            <tr>
                <td>${user.email}</td>
                <td>${user.name}</td>
                <td>${banned.includes(user.email) ? '🚫 محظور' : '✅ نشط'}</td>
                <td>
                    ${banned.includes(user.email) ? 
                        `<button class="ban-btn unban-btn" onclick="toggleBan('${user.email}', false)">رفع الحظر</button>` :
                        `<button class="ban-btn" onclick="toggleBan('${user.email}', true)">حظر</button>`
                    }
                </td>
            </tr>
        `).join('');
        
        document.getElementById('usersTableBody').innerHTML = usersHtml || '<tr><td colspan="4">لا يوجد مستخدمين</td></tr>';
        
        // تحميل الآراء
        const feedbackSnap = await db.ref('feedback').once('value');
        const feedbacks = feedbackSnap.val() || {};
        const feedbackHtml = Object.entries(feedbacks).map(([id, fb]) => `
            <tr>
                <td>${fb.userName}</td>
                <td>${fb.text}</td>
                <td>${new Date(fb.timestamp).toLocaleString('ar-EG')}</td>
                <td><button class="delete-feedback-admin" onclick="deleteFeedback('${id}')">🗑 حذف</button></td>
            </tr>
        `).join('');
        
        document.getElementById('feedbackTableBody').innerHTML = feedbackHtml || '<tr><td colspan="4">لا توجد آراء</td></tr>';
        
        document.getElementById('adminDashboard').style.display = 'block';
    }
    
    // حظر أو فك الحظر
    async function toggleBan(email, shouldBan) {
        const bannedSnap = await db.ref('bannedUsers').once('value');
        let banned = bannedSnap.val() || [];
        
        if (shouldBan && !banned.includes(email)) {
            banned.push(email);
        } else if (!shouldBan) {
            banned = banned.filter(e => e !== email);
        }
        
        await db.ref('bannedUsers').set(banned);
        openAdminDashboard(); // تحديث
    }
    
    // حذف رأي
    async function deleteFeedback(feedbackId) {
        await db.ref('feedback/' + feedbackId).remove();
        openAdminDashboard();
        if (currentStoryId) loadFeedbackForStory(currentStoryId);
    }
    
    // إضافة قصة جديدة
    async function addNewStory() {
        const title = document.getElementById('newStoryTitle').value;
        const content = document.getElementById('newStoryContent').value;
        const preview = document.getElementById('newStoryPreview').value;
        
        if (!title || !content) {
            alert("الرجاء ملء العنوان والمحتوى");
            return;
        }
        
        const newId = 'story_' + Date.now();
        await db.ref('stories/' + newId).set({
            id: newId,
            title: title,
            content: content.split('\n').map(p => `<p>${p}</p>`).join(''),
            preview: preview || title
        });
        
        alert("✅ تم إضافة القصة بنجاح");
        document.getElementById('newStoryTitle').value = '';
        document.getElementById('newStoryContent').value = '';
        document.getElementById('newStoryPreview').value = '';
        openAdminDashboard();
    }
    
    function closeAdminDashboard() {
        document.getElementById('adminDashboard').style.display = 'none';
    }
    
    function toggleAdminLogin() {
        const panel = document.getElementById('adminLoginPanel');
        panel.style.display = panel.style.display === 'block' ? 'none' : 'block';
    }
    
    async function logout() {
        await auth.signOut();
        currentUser = null;
        isAdmin = false;
        document.getElementById('loginOverlay').style.display = 'flex';
        document.getElementById('mainApp').style.display = 'none';
    }
    
    // بدء التشغيل
    initDatabase();
    
    // التحقق من حالة تسجيل الدخول
    auth.onAuthStateChanged(async (user) => {
        if (user) {
            const bannedSnap = await db.ref('bannedUsers').once('value');
            const banned = bannedSnap.val() || [];
            if (banned.includes(user.email)) {
                await auth.signOut();
                alert("⚠️ لقد تم حظرك من الموقع!");
                return;
            }
            currentUser = user;
            document.getElementById('loginOverlay').style.display = 'none';
            document.getElementById('mainApp').style.display = 'flex';
            document.getElementById('userNameDisplay').innerText = user.displayName;
            loadStories();
            setTimeout(() => openStory(localStorage.getItem('lastStory') || 'story_1'), 500);
        }
    });
</script>
</body>
</html>
