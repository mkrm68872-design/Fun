<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>رواية - منصة القصص التفاعلية</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Cairo', sans-serif; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; padding: 20px; }
        .container { max-width: 1400px; margin: 0 auto; }
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
        .card { background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px); border-radius: 30px; padding: 30px; margin-bottom: 25px; box-shadow: 0 20px 60px rgba(0,0,0,0.15); animation: fadeInUp 0.5s ease-out; }
        .header { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; border-radius: 25px; margin: -30px -30px 25px -30px; padding: 30px; }
        .header h1 { font-size: 2em; font-weight: 800; }
        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; margin-bottom: 8px; font-weight: 600; color: #333; }
        .form-group input, .form-group textarea, .form-group select { width: 100%; padding: 12px 15px; border: 2px solid #e0e0e0; border-radius: 15px; font-size: 16px; font-family: 'Cairo', sans-serif; transition: all 0.3s; }
        .form-group input:focus, .form-group textarea:focus { outline: none; border-color: #667eea; box-shadow: 0 0 0 3px rgba(102,126,234,0.1); }
        button { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; border: none; padding: 12px 30px; border-radius: 15px; font-size: 16px; font-weight: 600; cursor: pointer; transition: all 0.3s; margin: 5px; }
        button:hover { transform: translateY(-2px); box-shadow: 0 5px 20px rgba(102,126,234,0.4); }
        .btn-danger { background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%); }
        .btn-success { background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%); }
        .btn-warning { background: linear-gradient(135deg, #fa709a 0%, #fee140 100%); color: #333; }
        .two-columns { display: grid; grid-template-columns: 1fr 1fr; gap: 25px; }
        @media (max-width: 992px) { .two-columns { grid-template-columns: 1fr; } }
        .story-card { background: #f8f9fa; padding: 20px; border-radius: 20px; margin-bottom: 15px; cursor: pointer; transition: all 0.3s; border-right: 4px solid #667eea; }
        .story-card:hover { transform: translateX(-5px); box-shadow: 0 5px 20px rgba(0,0,0,0.1); }
        .story-title { font-size: 1.2em; font-weight: 700; color: #333; }
        .story-topic { color: #667eea; font-size: 0.9em; }
        .progress-bar { background: #e0e0e0; border-radius: 20px; height: 6px; margin-top: 10px; }
        .progress-fill { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); height: 100%; border-radius: 20px; }
        .chat-container { background: white; border-radius: 20px; overflow: hidden; border: 1px solid #eee; display: flex; flex-direction: column; height: 500px; }
        .chat-header { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; }
        .chat-status { font-size: 12px; padding: 5px 10px; border-radius: 20px; background: rgba(255,255,255,0.2); }
        .chat-status.open { background: #4caf50; }
        .chat-status.closed { background: #f44336; }
        .chat-messages { flex: 1; overflow-y: auto; padding: 15px; background: #fafafa; }
        .message { margin-bottom: 15px; display: flex; flex-direction: column; animation: fadeInUp 0.2s ease-out; cursor: pointer; transition: all 0.2s; }
        .message:hover { background: rgba(102,126,234,0.05); border-radius: 10px; }
        .message-header { display: flex; justify-content: space-between; margin-bottom: 5px; font-size: 12px; align-items: center; }
        .message-sender { font-weight: 600; color: #667eea; display: flex; align-items: center; gap: 8px; }
        .profile-pic { width: 30px; height: 30px; border-radius: 50%; background: linear-gradient(135deg, #667eea, #764ba2); display: inline-flex; align-items: center; justify-content: center; color: white; font-size: 12px; font-weight: bold; object-fit: cover; }
        .profile-pic-img { width: 30px; height: 30px; border-radius: 50%; object-fit: cover; }
        .message-time { color: #999; font-size: 10px; }
        .message-text { background: white; padding: 10px 15px; border-radius: 15px; border-top-right-radius: 5px; display: inline-block; max-width: 80%; word-wrap: break-word; }
        .message-actions { display: flex; gap: 10px; margin-top: 5px; }
        .like-btn { background: none; border: none; color: #999; cursor: pointer; font-size: 12px; padding: 2px 8px; border-radius: 15px; transition: all 0.2s; }
        .like-btn:hover { background: rgba(102,126,234,0.1); }
        .like-btn.liked { color: #e91e63; }
        .message.deleted .message-text { background: #eee; color: #999; font-style: italic; }
        .chat-input-area { padding: 15px; background: white; border-top: 1px solid #eee; display: flex; gap: 10px; }
        .chat-input-area input { flex: 1; padding: 12px; border: 2px solid #e0e0e0; border-radius: 25px; font-family: 'Cairo', sans-serif; }
        .chat-input-area input:disabled { background: #f0f0f0; }
        .popup-menu { position: fixed; background: white; border-radius: 15px; box-shadow: 0 10px 40px rgba(0,0,0,0.2); overflow: hidden; z-index: 1000; animation: fadeInUp 0.2s ease-out; }
        .popup-menu div { padding: 12px 20px; cursor: pointer; transition: background 0.2s; display: flex; align-items: center; gap: 10px; }
        .popup-menu div:hover { background: #f0f0f0; }
        .popup-menu div.danger { color: #f5576c; }
        .reading-content { line-height: 1.8; font-size: 18px; color: #444; max-height: 60vh; overflow-y: auto; padding: 20px; background: #fafafa; border-radius: 20px; }
        .admin-section { background: white; border-radius: 20px; padding: 25px; margin-bottom: 25px; box-shadow: 0 5px 15px rgba(0,0,0,0.05); }
        .admin-section h3 { color: #667eea; margin-bottom: 20px; display: flex; align-items: center; gap: 10px; }
        .user-item { background: white; padding: 12px; margin-bottom: 10px; border-radius: 12px; display: flex; justify-content: space-between; align-items: center; border: 1px solid #e0e0e0; }
        .hidden { display: none; }
        .tabs { display: flex; gap: 10px; margin-bottom: 20px; flex-wrap: wrap; }
        .tab { background: rgba(102,126,234,0.1); padding: 10px 25px; border-radius: 50px; cursor: pointer; font-weight: 600; color: #667eea; transition: all 0.3s; }
        .tab:hover { transform: translateY(-2px); }
        .tab.active { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; }
        .alert { padding: 12px 20px; border-radius: 15px; margin-bottom: 15px; animation: fadeInUp 0.3s ease-out; }
        .alert-error { background: #ffebee; color: #c62828; border-right: 4px solid #c62828; }
        .alert-success { background: #e8f5e9; color: #2e7d32; border-right: 4px solid #2e7d32; }
        .user-info { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 15px; }
        .badge { background: rgba(255,255,255,0.2); padding: 4px 12px; border-radius: 20px; font-size: 12px; }
        .profile-upload { display: flex; align-items: center; gap: 15px; margin-bottom: 20px; flex-wrap: wrap; }
        .current-avatar { width: 50px; height: 50px; border-radius: 50%; background: linear-gradient(135deg, #667eea, #764ba2); display: flex; align-items: center; justify-content: center; color: white; font-size: 20px; object-fit: cover; }
        .story-editor { background: white; border-radius: 20px; padding: 25px; }
        .story-editor textarea { min-height: 200px; }
        .flex-between { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 10px; }
        .notification-toast { position: fixed; bottom: 20px; right: 20px; background: #333; color: white; padding: 12px 20px; border-radius: 15px; z-index: 1100; animation: fadeInUp 0.3s ease-out; }
        .appeal-box { background: #f0f0f0; padding: 15px; border-radius: 15px; margin: 10px; }
    </style>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-storage-compat.js"></script>
</head>
<body>
    <div class="container" id="app">
        <!-- شاشة تسجيل الدخول -->
        <div id="authScreen" class="card">
            <div class="header">
                <h1><i class="fas fa-book-open"></i> رواية</h1>
                <p>منصة القصص التفاعلية</p>
            </div>
            <div id="authTabs">
                <div class="tabs">
                    <div class="tab active" onclick="switchAuthTab('login')">تسجيل دخول</div>
                    <div class="tab" onclick="switchAuthTab('signup')">إنشاء حساب</div>
                </div>
                <div id="loginForm">
                    <div class="form-group"><label><i class="fas fa-envelope"></i> البريد الإلكتروني</label><input type="email" id="loginEmail" placeholder="example@email.com"></div>
                    <div class="form-group"><label><i class="fas fa-lock"></i> كلمة المرور</label><input type="password" id="loginPassword" placeholder="********"></div>
                    <button onclick="login()"><i class="fas fa-sign-in-alt"></i> دخول</button>
                </div>
                <div id="signupForm" class="hidden">
                    <div class="form-group"><label><i class="fas fa-user"></i> الاسم</label><input type="text" id="signupName" placeholder="اسمك"></div>
                    <div class="form-group"><label><i class="fas fa-envelope"></i> البريد الإلكتروني</label><input type="email" id="signupEmail" placeholder="example@email.com"></div>
                    <div class="form-group"><label><i class="fas fa-lock"></i> كلمة المرور</label><input type="password" id="signupPassword" placeholder="********"></div>
                    <div class="form-group"><label><i class="fas fa-check-circle"></i> تأكيد كلمة المرور</label><input type="password" id="signupConfirmPassword" placeholder="********"></div>
                    <button onclick="signup()"><i class="fas fa-user-plus"></i> إنشاء حساب</button>
                </div>
            </div>
        </div>

        <!-- الشاشة الرئيسية -->
        <div id="mainScreen" class="hidden">
            <div class="card" style="padding:0; overflow:hidden;">
                <div class="header" style="margin:0; border-radius:25px;">
                    <div class="user-info">
                        <div style="display: flex; align-items: center; gap: 15px; flex-wrap: wrap;">
                            <div class="profile-upload">
                                <img id="profilePicImg" class="current-avatar" src="">
                                <label for="profileUpload" style="background:rgba(255,255,255,0.2);padding:5px 12px;border-radius:20px;cursor:pointer;"><i class="fas fa-camera"></i> تغيير الصورة</label>
                                <input type="file" id="profileUpload" accept="image/*" style="display:none" onchange="uploadProfilePicture(this)">
                            </div>
                            <div><i class="fas fa-user-circle"></i> <strong id="userName"></strong> <span class="badge">كود: <span id="userCode"></span></span></div>
                        </div>
                        <div><button onclick="logout()" style="background:rgba(255,255,255,0.2);"><i class="fas fa-sign-out-alt"></i> تسجيل خروج</button></div>
                    </div>
                </div>
            </div>
            <div class="card">
                <div class="tabs">
                    <div class="tab active" onclick="switchMainTab('stories')"><i class="fas fa-book"></i> القصص</div>
                    <div class="tab hidden" onclick="switchMainTab('admin')" id="adminTab"><i class="fas fa-crown"></i> لوحة الأدمن</div>
                </div>
                <div id="storiesPanel">
                    <div class="two-columns">
                        <div><h3><i class="fas fa-feather-alt"></i> القصص</h3><div id="storiesList"></div></div>
                        <div>
                            <div class="chat-container">
                                <div class="chat-header"><span><i class="fas fa-comments"></i> الشات العام</span><span class="chat-status" id="chatStatus">مفتوح</span></div>
                                <div class="chat-messages" id="chatMessages"></div>
                                <div class="chat-input-area">
                                    <input type="text" id="chatInput" placeholder="اكتب رسالتك..." onkeypress="if(event.key==='Enter') sendMessage()">
                                    <button onclick="sendMessage()"><i class="fas fa-paper-plane"></i></button>
                                </div>
                                <div id="appealBox" class="appeal-box hidden">
                                    <p><i class="fas fa-gavel"></i> تم طردك من الجروب</p>
                                    <textarea id="appealReason" placeholder="اكتب سبب استئنافك..." rows="3" style="width:100%;margin:10px 0;padding:10px;border-radius:10px;"></textarea>
                                    <button onclick="sendAppeal()" class="btn-warning">إرسال طلب استئناف</button>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
                <div id="adminPanel" class="hidden">
                    <h2><i class="fas fa-crown"></i> لوحة تحكم الأدمن</h2>
                    <div class="admin-section">
                        <h3><i class="fas fa-users"></i> إعدادات الجروب</h3>
                        <div class="flex-between">
                            <button onclick="toggleGroup()" id="toggleGroupBtn" class="btn-warning"><i class="fas fa-lock"></i> قفل الجروب</button>
                            <span>المكتومين: <span id="mutedCount">0</span></span>
                        </div>
                        <div id="mutedUsersList" style="margin-top: 15px;"></div>
                    </div>
                    <div class="admin-section">
                        <h3><i class="fas fa-gavel"></i> طلبات الاستئناف</h3>
                        <div id="appealsList"></div>
                    </div>
                    <div class="admin-section">
                        <h3><i class="fas fa-user-shield"></i> إدارة المشرفين</h3>
                        <div class="form-group"><label><i class="fas fa-envelope"></i> البريد الإلكتروني</label><input type="email" id="adminUserEmail" placeholder="example@email.com"></div>
                        <button onclick="makeAdmin()" class="btn-success"><i class="fas fa-user-plus"></i> تعيين كأدمن</button>
                        <button onclick="removeAdmin()" class="btn-danger"><i class="fas fa-user-minus"></i> إزالة من الأدمن</button>
                        <div id="adminsList" style="margin-top: 15px;"></div>
                    </div>
                    <div class="admin-section">
                        <h3><i class="fas fa-plus-circle"></i> إضافة قصة جديدة</h3>
                        <div class="form-group"><label><i class="fas fa-heading"></i> عنوان القصة</label><input type="text" id="newStoryTitle" placeholder="عنوان القصة"></div>
                        <div class="form-group"><label><i class="fas fa-tag"></i> الموضوع/التصنيف</label><input type="text" id="newStoryTopic" placeholder="مثال: خيال علمي"></div>
                        <div class="form-group"><label><i class="fas fa-file-alt"></i> محتوى القصة</label><textarea id="newStoryContent" placeholder="اكتب قصة رائعة..."></textarea></div>
                        <button onclick="addNewStory()"><i class="fas fa-save"></i> نشر القصة</button>
                    </div>
                    <div class="admin-section">
                        <h3><i class="fas fa-edit"></i> تعديل القصص</h3>
                        <div class="form-group"><label><i class="fas fa-search"></i> اختر قصة للتعديل</label><select id="editStorySelect" onchange="loadStoryForEdit()"><option value="">-- اختر قصة --</option></select></div>
                        <div id="editStoryArea" class="hidden story-editor">
                            <div class="form-group"><label><i class="fas fa-heading"></i> عنوان القصة</label><input type="text" id="editStoryTitle"></div>
                            <div class="form-group"><label><i class="fas fa-tag"></i> الموضوع/التصنيف</label><input type="text" id="editStoryTopic"></div>
                            <div class="form-group"><label><i class="fas fa-file-alt"></i> محتوى القصة</label><textarea id="editStoryContent" rows="8"></textarea></div>
                            <div class="flex-between">
                                <button onclick="updateStory()" class="btn-success"><i class="fas fa-save"></i> حفظ التعديلات</button>
                                <button onclick="deleteStory()" class="btn-danger"><i class="fas fa-trash"></i> حذف القصة</button>
                            </div>
                        </div>
                    </div>
                </div>
                <div id="readingPanel" class="hidden">
                    <button onclick="backToStories()"><i class="fas fa-arrow-right"></i> العودة للقصص</button>
                    <h2 id="readingTitle"></h2>
                    <div class="progress-bar"><div class="progress-fill" id="readingProgress" style="width:0%"></div></div>
                    <div id="readingContent" class="reading-content" onscroll="saveScrollPosition()"></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyDtQfLsSxTEtuIYwrqvkIkne_fdpIEEavM",
            authDomain: "read123-b23d1.firebaseapp.com",
            databaseURL: "https://read123-b23d1-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "read123-b23d1",
            storageBucket: "read123-b23d1.firebasestorage.app",
            messagingSenderId: "926218832304",
            appId: "1:926218832304:web:02f3559410665cbd756e75"
        };

        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const database = firebase.database();
        const storage = firebase.storage();

        let currentUser = null, currentUserRole = 'user', currentStory = null, saveTimeout = null;
        let groupSettings = { isOpen: true, mutedUsers: {}, kickedUsers: {} };
        let currentPopup = null;

        auth.onAuthStateChanged(async (user) => {
            if (user) {
                currentUser = user;
                await loadUserData();
                await loadGroupSettings();
                document.getElementById('authScreen').classList.add('hidden');
                document.getElementById('mainScreen').classList.remove('hidden');
                loadStories();
                loadMessages();
                loadAppealsList();
                if (currentUserRole === 'admin') {
                    document.getElementById('adminTab').classList.remove('hidden');
                    loadAdminsList();
                    loadStoriesForEdit();
                    loadMutedUsersList();
                }
                updateChatInputStatus();
                updateProfileDisplay();
                checkIfKicked();
            } else {
                document.getElementById('authScreen').classList.remove('hidden');
                document.getElementById('mainScreen').classList.add('hidden');
            }
        });

        async function loadUserData() {
            const userRef = database.ref('users/' + currentUser.uid);
            const snapshot = await userRef.once('value');
            let userData = snapshot.val();
            if (!userData) {
                userData = { 
                    email: currentUser.email, 
                    name: currentUser.displayName || currentUser.email.split('@')[0], 
                    personalCode: Math.random().toString(36).substring(2,8).toUpperCase(), 
                    role: 'user', 
                    createdAt: Date.now(),
                    profilePic: null
                };
                await userRef.set(userData);
            }
            const adminEmail = currentUser.email.replace(/\./g, ',');
            const adminCheck = await database.ref('admins/' + adminEmail).once('value');
            currentUserRole = adminCheck.val() === true ? 'admin' : (userData.role || 'user');
            if (currentUserRole !== userData.role) await userRef.update({ role: currentUserRole });
            document.getElementById('userName').innerText = userData.name;
            document.getElementById('userCode').innerText = userData.personalCode;
            if (userData.profilePic) {
                document.getElementById('profilePicImg').src = userData.profilePic;
            } else {
                document.getElementById('profilePicImg').src = '';
                updateProfileDisplay();
            }
        }

        function updateProfileDisplay() {
            const img = document.getElementById('profilePicImg');
            if (!img.src || img.src === '') {
                const name = document.getElementById('userName').innerText;
                const initial = name ? name.charAt(0) : '?';
                img.style.background = 'linear-gradient(135deg, #667eea, #764ba2)';
                img.style.display = 'flex';
                img.style.alignItems = 'center';
                img.style.justifyContent = 'center';
                img.style.fontSize = '20px';
                img.style.color = 'white';
                img.src = '';
                img.setAttribute('data-initial', initial);
                img.innerText = initial;
            }
        }

        async function uploadProfilePicture(input) {
            if (!input.files || !input.files[0]) return;
            const file = input.files[0];
            const storageRef = storage.ref(`profilePics/${currentUser.uid}`);
            await storageRef.put(file);
            const url = await storageRef.getDownloadURL();
            await database.ref('users/' + currentUser.uid).update({ profilePic: url });
            document.getElementById('profilePicImg').src = url;
            showNotification('تم تحديث الصورة الشخصية بنجاح', 'success');
        }

        async function loadGroupSettings() {
            const settingsRef = await database.ref('chat/settings').once('value');
            const settings = settingsRef.val();
            if (settings) { 
                groupSettings.isOpen = settings.isOpen !== false; 
                groupSettings.mutedUsers = settings.mutedUsers || {};
                groupSettings.kickedUsers = settings.kickedUsers || {};
            } else { 
                await database.ref('chat/settings').set({ isOpen: true, mutedUsers: {}, kickedUsers: {} });
            }
            updateChatStatusUI();
        }

        function checkIfKicked() {
            const isKicked = groupSettings.kickedUsers && groupSettings.kickedUsers[currentUser?.uid];
            const appealBox = document.getElementById('appealBox');
            if (isKicked) {
                if (appealBox) appealBox.classList.remove('hidden');
                document.getElementById('chatInput').disabled = true;
            } else {
                if (appealBox) appealBox.classList.add('hidden');
            }
        }

        async function sendAppeal() {
            const reason = document.getElementById('appealReason').value;
            if (!reason) { showAlert('الرجاء كتابة سبب الاستئناف', 'error'); return; }
            await database.ref('appeals/' + currentUser.uid).set({
                userId: currentUser.uid,
                userName: document.getElementById('userName').innerText,
                reason: reason,
                status: 'pending',
                timestamp: Date.now()
            });
            showAlert('تم إرسال طلب الاستئناف إلى الأدمن', 'success');
            document.getElementById('appealReason').value = '';
        }

        function loadAppealsList() {
            if (currentUserRole !== 'admin') return;
            database.ref('appeals').orderByChild('status').equalTo('pending').on('value', (snapshot) => {
                const appeals = snapshot.val();
                const container = document.getElementById('appealsList');
                if (!container) return;
                container.innerHTML = '<h4>طلبات الاستئناف المعلقة:</h4>';
                if (!appeals || Object.keys(appeals).length === 0) {
                    container.innerHTML += '<p>لا توجد طلبات حالياً</p>';
                    return;
                }
                for (const [id, appeal] of Object.entries(appeals)) {
                    container.innerHTML += `
                        <div class="user-item">
                            <div><strong>${appeal.userName}</strong><br><small>${appeal.reason.substring(0, 100)}</small></div>
                            <div>
                                <button onclick="approveAppeal('${id}')" class="btn-success" style="padding:5px 10px;">قبول</button>
                                <button onclick="rejectAppeal('${id}')" class="btn-danger" style="padding:5px 10px;">رفض</button>
                            </div>
                        </div>
                    `;
                }
            });
        }

        async function approveAppeal(appealId) {
            const appealSnap = await database.ref('appeals/' + appealId).once('value');
            const appeal = appealSnap.val();
            if (appeal && groupSettings.kickedUsers[appeal.userId]) {
                delete groupSettings.kickedUsers[appeal.userId];
                await database.ref('chat/settings').update({ kickedUsers: groupSettings.kickedUsers });
                await database.ref('appeals/' + appealId).update({ status: 'approved' });
                showAlert(`تم قبول استئناف ${appeal.userName} وعودته للجروب`, 'success');
                if (appeal.userId === currentUser?.uid) checkIfKicked();
            }
        }

        async function rejectAppeal(appealId) {
            await database.ref('appeals/' + appealId).update({ status: 'rejected' });
            showAlert('تم رفض الطلب', 'info');
        }

        function updateChatStatusUI() {
            const statusSpan = document.getElementById('chatStatus');
            if(statusSpan) { statusSpan.innerText = groupSettings.isOpen ? '🟢 مفتوح' : '🔴 مقفول'; statusSpan.className = `chat-status ${groupSettings.isOpen ? 'open' : 'closed'}`; }
            const toggleBtn = document.getElementById('toggleGroupBtn');
            if(toggleBtn) toggleBtn.innerHTML = groupSettings.isOpen ? '<i class="fas fa-lock"></i> قفل الجروب' : '<i class="fas fa-lock-open"></i> فتح الجروب';
        }

        function updateChatInputStatus() {
            const input = document.getElementById('chatInput');
            if(!input) return;
            const isMuted = groupSettings.mutedUsers && groupSettings.mutedUsers[currentUser?.uid];
            const isKicked = groupSettings.kickedUsers && groupSettings.kickedUsers[currentUser?.uid];
            if (isKicked) { input.disabled = true; input.placeholder = '🚫 تم طردك من الجروب'; }
            else if (!groupSettings.isOpen && currentUserRole !== 'admin') { input.disabled = true; input.placeholder = '🔒 الجروب مقفول (الأدمن فقط)'; }
            else if (isMuted) { input.disabled = true; input.placeholder = '🚫 أنت مكتوم'; }
            else { input.disabled = false; input.placeholder = 'اكتب رسالتك...'; }
        }

        function toggleGroup() { 
            if(currentUserRole !== 'admin') return; 
            groupSettings.isOpen = !groupSettings.isOpen; 
            database.ref('chat/settings').update({ isOpen: groupSettings.isOpen }); 
            updateChatStatusUI(); 
            updateChatInputStatus(); 
            showAlert(groupSettings.isOpen ? 'تم فتح الجروب' : 'تم قفل الجروب (الأدمن فقط يستطيعون الكتابة)', 'success');
        }

        function showNotification(message, type = 'info') {
            const toast = document.createElement('div');
            toast.className = 'notification-toast';
            toast.innerHTML = `<i class="fas ${type === 'success' ? 'fa-check-circle' : 'fa-exclamation-circle'}"></i> ${message}`;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 4000);
        }

        function login() { const email=document.getElementById('loginEmail').value, pass=document.getElementById('loginPassword').value; if(!email||!pass){showAlert('املأ الحقول','error');return;} auth.signInWithEmailAndPassword(email,pass).catch(e=>showAlert(e.message,'error')); }
        async function signup() { const name=document.getElementById('signupName').value, email=document.getElementById('signupEmail').value, pass=document.getElementById('signupPassword').value, confirm=document.getElementById('signupConfirmPassword').value; if(!name||!email||!pass){showAlert('املأ الحقول','error');return;} if(pass!==confirm){showAlert('كلمة المرور غير متطابقة','error');return;} try{ const uc=await auth.createUserWithEmailAndPassword(email,pass); await database.ref('users/'+uc.user.uid).set({name,email,personalCode:Math.random().toString(36).substring(2,8).toUpperCase(),role:'user',createdAt:Date.now()}); showAlert('تم إنشاء الحساب!','success'); }catch(e){showAlert(e.message,'error');} }
        function logout() { auth.signOut(); }
        function switchAuthTab(tab) { const tabs = document.querySelectorAll('#authTabs .tab'); tabs.forEach(t=>t.classList.remove('active')); if(tab==='login'){ tabs[0].classList.add('active'); document.getElementById('loginForm').classList.remove('hidden'); document.getElementById('signupForm').classList.add('hidden'); }else{ tabs[1].classList.add('active'); document.getElementById('loginForm').classList.add('hidden'); document.getElementById('signupForm').classList.remove('hidden'); } }
        function switchMainTab(tab) { if(tab==='stories'){ document.getElementById('storiesPanel').classList.remove('hidden'); document.getElementById('adminPanel').classList.add('hidden'); document.getElementById('readingPanel').classList.add('hidden'); loadStories(); }else if(tab==='admin'){ document.getElementById('storiesPanel').classList.add('hidden'); document.getElementById('adminPanel').classList.remove('hidden'); document.getElementById('readingPanel').classList.add('hidden'); loadAdminsList(); loadStoriesForEdit(); loadMutedUsersList(); loadAppealsList(); } }
        
        function loadStories() { database.ref('stories').on('value',async(snapshot)=>{ const stories=snapshot.val(); const container=document.getElementById('storiesList'); container.innerHTML=''; if(!stories){container.innerHTML='لا توجد قصص';return;} for(const[id,story] of Object.entries(stories)){ const progress=await database.ref(`readingProgress/${currentUser.uid}/${id}`).once('value'); const percent=progress.val()?.percentage||0; const div=document.createElement('div'); div.className='story-card'; div.onclick=()=>openStory(id,story); div.innerHTML=`<div class="story-title">${story.title}</div><div class="story-topic">${story.topic||''}</div><div class="progress-bar"><div class="progress-fill" style="width:${percent}%"></div></div><div style="font-size:12px">${percent}% مكتمل</div>`; container.appendChild(div); } }); }
        
        async function openStory(id,story){ currentStory={id,...story}; document.getElementById('storiesPanel').classList.add('hidden'); document.getElementById('readingPanel').classList.remove('hidden'); document.getElementById('readingTitle').innerHTML=story.title; const paragraphs=(story.content||'').split('\n').filter(p=>p.trim()); document.getElementById('readingContent').innerHTML=paragraphs.map(p=>`<p>${p}</p>`).join(''); const progress=await database.ref(`readingProgress/${currentUser.uid}/${id}`).once('value'); if(progress.val()?.scrollPosition){ setTimeout(()=>{ const div=document.getElementById('readingContent'); div.scrollTop=progress.val().scrollPosition; document.getElementById('readingProgress').style.width=(progress.val().percentage||0)+'%'; },100); } }
        function saveScrollPosition(){ if(!currentStory) return; if(saveTimeout) clearTimeout(saveTimeout); saveTimeout=setTimeout(async()=>{ const div=document.getElementById('readingContent'); const pos=div.scrollTop; const height=div.scrollHeight-div.clientHeight; const percent=height>0?Math.round((pos/height)*100):0; await database.ref(`readingProgress/${currentUser.uid}/${currentStory.id}`).set({scrollPosition:pos,percentage:percent,lastRead:Date.now()}); document.getElementById('readingProgress').style.width=percent+'%'; },1000); }
        function backToStories(){ document.getElementById('readingPanel').classList.add('hidden'); document.getElementById('storiesPanel').classList.remove('hidden'); currentStory=null; }
        
        async function sendMessage(){ 
            const input=document.getElementById('chatInput'); 
            const text=input.value.trim(); 
            if(!text) return; 
            if(groupSettings.kickedUsers && groupSettings.kickedUsers[currentUser.uid]){ showAlert('تم طردك من الجروب','error'); return; }
            if(!groupSettings.isOpen && currentUserRole !== 'admin'){ showAlert('الجروب مقفول (الأدمن فقط)','error'); return; }
            if(groupSettings.mutedUsers && groupSettings.mutedUsers[currentUser.uid]){ showAlert('أنت مكتوم','error'); return; }
            const userSnap = await database.ref('users/' + currentUser.uid).once('value');
            const userData = userSnap.val();
            await database.ref('chat/messages').push({ 
                senderId:currentUser.uid, 
                senderName:userData.name, 
                senderCode:userData.personalCode, 
                text:text, 
                timestamp:Date.now(), 
                deleted:false,
                likes:0,
                likedBy:{},
                profilePic: userData.profilePic || null
            }); 
            input.value=''; 
        }
        
        function loadMessages(){ 
            database.ref('chat/messages').orderByChild('timestamp').on('value',async(snapshot)=>{ 
                const messages=snapshot.val(); 
                const container=document.getElementById('chatMessages'); 
                if(!container) return; 
                container.innerHTML=''; 
                if(!messages) return; 
                const isKicked = groupSettings.kickedUsers && groupSettings.kickedUsers[currentUser?.uid];
                if(isKicked){ container.innerHTML='<div style="text-align:center;padding:50px;color:#999;"><i class="fas fa-ban"></i> تم طردك من الجروب ولا يمكنك رؤية الرسائل</div>'; return; }
                const sorted=Object.entries(messages).sort((a,b)=>a[1].timestamp-b[1].timestamp); 
                for(const[id,msg] of sorted){ 
                    const isMutedUser=groupSettings.mutedUsers && groupSettings.mutedUsers[msg.senderId];
                    const isLiked = msg.likedBy && msg.likedBy[currentUser?.uid];
                    const div=document.createElement('div'); 
                    div.className=`message ${isMutedUser?'muted':''} ${msg.deleted?'deleted':''}`; 
                    div.setAttribute('data-message-id',id); 
                    div.setAttribute('data-sender-id',msg.senderId); 
                    let profileHtml = '';
                    if (msg.profilePic) {
                        profileHtml = `<img src="${msg.profilePic}" class="profile-pic-img" style="width:25px;height:25px;border-radius:50%;object-fit:cover;">`;
                    } else {
                        const initial = msg.senderName ? msg.senderName.charAt(0) : '?';
                        profileHtml = `<span class="profile-pic" style="width:25px;height:25px;font-size:12px;">${initial}</span>`;
                    }
                    div.innerHTML=`<div class="message-header"><span class="message-sender">${profileHtml} ${msg.senderName} (${msg.senderCode})</span><span class="message-time">${new Date(msg.timestamp).toLocaleTimeString('ar-EG')}</span></div><div class="message-text">${msg.deleted?'🗑️ تم حذف هذه الرسالة':msg.text}</div><div class="message-actions"><button class="like-btn ${isLiked ? 'liked' : ''}" onclick="toggleLike('${id}', event)"><i class="fas fa-heart"></i> ${msg.likes || 0}</button></div>`; 
                    div.onclick=(e)=>{ if(!e.target.closest('.like-btn')) showMessageOptions(id,msg,e); };
                    container.appendChild(div); 
                } 
                container.scrollTop=container.scrollHeight; 
            }); 
        }
        
        async function toggleLike(msgId, event){ event.stopPropagation(); const msgRef = database.ref('chat/messages/'+msgId); const snapshot = await msgRef.once('value'); const msg = snapshot.val(); if(!msg) return; const likedBy = msg.likedBy || {}; const isLiked = likedBy[currentUser?.uid]; let newLikes = msg.likes || 0; if(isLiked){ delete likedBy[currentUser.uid]; newLikes--; }else{ likedBy[currentUser.uid] = true; newLikes++; } await msgRef.update({ likes: newLikes, likedBy: likedBy }); }
        
        function showMessageOptions(msgId,msg,event){ 
            if(currentUserRole!=='admin') return; 
            if(currentPopup) currentPopup.remove(); 
            const rect=event.target.getBoundingClientRect(); 
            const popup=document.createElement('div'); 
            popup.className='popup-menu'; 
            popup.style.top=rect.bottom+5+'px'; 
            popup.style.left=rect.left+'px'; 
            const isMuted=groupSettings.mutedUsers && groupSettings.mutedUsers[msg.senderId];
            popup.innerHTML=`<div onclick="toggleMuteUser('${msg.senderId}','${msg.senderName}')"><i class="fas fa-microphone-slash"></i> ${isMuted?'🔓 فك الكتم':'🔇 كتم المستخدم'}</div><div onclick="kickUser('${msg.senderId}','${msg.senderName}')" class="danger"><i class="fas fa-ban"></i> 🚫 طرد المستخدم</div><div onclick="deleteMessage('${msgId}')" class="danger"><i class="fas fa-trash"></i> 🗑️ حذف الرسالة</div>`; 
            document.body.appendChild(popup); 
            currentPopup=popup; 
            setTimeout(()=>{if(currentPopup) currentPopup.remove(); currentPopup=null;},5000); 
        }
        
        async function kickUser(userId,userName){ 
            if(currentUserRole!=='admin') return; 
            if(currentPopup) currentPopup.remove(); 
            if(confirm(`هل تريد طرد ${userName} من الجروب نهائياً؟`)){ 
                groupSettings.kickedUsers[userId] = { kickedAt: Date.now(), kickedBy: currentUser.uid };
                await database.ref('chat/settings').update({ kickedUsers: groupSettings.kickedUsers });
                showAlert(`تم طرد ${userName} من الجروب`,'success');
                showNotification(`🚫 تم طرد ${userName} من الجروب`);
                if(userId === currentUser?.uid) updateChatInputStatus();
                loadMutedUsersList();
            } 
        }
        
        async function toggleMuteUser(userId,userName){ 
            if(currentUserRole!=='admin') return; 
            if(currentPopup) currentPopup.remove(); 
            const isMuted=groupSettings.mutedUsers && groupSettings.mutedUsers[userId]; 
            if(isMuted){ delete groupSettings.mutedUsers[userId]; showAlert(`تم فك الكتم عن ${userName}`,'success'); 
            }else{ groupSettings.mutedUsers[userId]={mutedAt:Date.now(),mutedBy:currentUser.uid}; showAlert(`تم كتم ${userName}`,'success'); showNotification(`🔇 تم كتم ${userName}`); } 
            await database.ref('chat/settings').update({ mutedUsers: groupSettings.mutedUsers }); 
            if(userId===currentUser?.uid) updateChatInputStatus(); 
            loadMutedUsersList(); 
        }
        
        async function deleteMessage(msgId){ if(currentUserRole!=='admin') return; if(currentPopup) currentPopup.remove(); await database.ref('chat/messages/'+msgId).update({deleted:true,text:''}); showAlert('تم حذف الرسالة','success'); }
        
        async function loadMutedUsersList(){ 
            const container=document.getElementById('mutedUsersList'); 
            if(!container) return; 
            const count = Object.keys(groupSettings.mutedUsers || {}).length;
            document.getElementById('mutedCount').innerText = count;
            if(!groupSettings.mutedUsers || Object.keys(groupSettings.mutedUsers).length===0){ container.innerHTML='<p>لا يوجد مكتومين</p>'; return; } 
            container.innerHTML='<h3>المكتومين حالياً:</h3>'; 
            for(const[uid] of Object.entries(groupSettings.mutedUsers)){ 
                const userSnap=await database.ref('users/'+uid).once('value'); 
                const userName=userSnap.val()?.name||uid; 
                container.innerHTML+=`<div class="user-item">${userName} <button onclick="unmuteUser('${uid}')" class="btn-success" style="padding:5px 10px;"><i class="fas fa-microphone"></i> فك الكتم</button></div>`; 
            } 
        }
        
        async function unmuteUser(uid){ if(currentUserRole!=='admin') return; delete groupSettings.mutedUsers[uid]; await database.ref('chat/settings').update({ mutedUsers: groupSettings.mutedUsers }); loadMutedUsersList(); if(uid===currentUser?.uid) updateChatInputStatus(); showAlert('تم فك الكتم','success'); }
        
        function loadStoriesForEdit(){ database.ref('stories').once('value',(snapshot)=>{ const stories=snapshot.val(); const select=document.getElementById('editStorySelect'); if(select){ select.innerHTML='<option value="">-- اختر قصة --</option>'; if(stories) for(const[id,story] of Object.entries(stories)) select.innerHTML+=`<option value="${id}">📖 ${story.title}</option>`; } }); }
        
        async function addNewStory(){ 
            if(currentUserRole!=='admin') return; 
            const title=document.getElementById('newStoryTitle')?.value, topic=document.getElementById('newStoryTopic')?.value, content=document.getElementById('newStoryContent')?.value; 
            if(!title||!content){showAlert('املأ العنوان والمحتوى','error');return;} 
            const newStoryRef = database.ref('stories').push();
            await newStoryRef.set({title,topic,content,lastEdited:Date.now(),editedBy:currentUser.uid});
            document.getElementById('newStoryTitle').value=''; document.getElementById('newStoryTopic').value=''; document.getElementById('newStoryContent').value='';
            showAlert('تم نشر القصة بنجاح!','success'); loadStoriesForEdit(); 
        }
        
        async function loadStoryForEdit(){ 
            const storyId=document.getElementById('editStorySelect').value; 
            if(!storyId){document.getElementById('editStoryArea').classList.add('hidden'); return;} 
            const story=await (await database.ref('stories/'+storyId).once('value')).val(); 
            document.getElementById('editStoryTitle').value=story.title||''; 
            document.getElementById('editStoryTopic').value=story.topic||''; 
            document.getElementById('editStoryContent').value=story.content||''; 
            document.getElementById('editStoryArea').classList.remove('hidden'); 
            window.currentEditStoryId=storyId; 
        }
        
        async function updateStory(){ 
            if(!window.currentEditStoryId) return; 
            await database.ref('stories/'+window.currentEditStoryId).update({ 
                title:document.getElementById('editStoryTitle').value, 
                topic:document.getElementById('editStoryTopic').value, 
                content:document.getElementById('editStoryContent').value, 
                lastEdited:Date.now(), 
                editedBy:currentUser.uid 
            }); 
            showAlert('تم تحديث القصة!','success'); 
            showNotification(`📝 تم تحديث قصة "${document.getElementById('editStoryTitle').value}"`);
            loadStories(); 
        }
        
        async function deleteStory(){ 
            if(!window.currentEditStoryId) return; 
            if(!confirm('تأكيد حذف القصة؟')) return; 
            await database.ref('stories/'+window.currentEditStoryId).remove(); 
            showAlert('تم حذف القصة','success'); 
            showNotification('🗑️ تم حذف قصة');
            loadStories(); 
            document.getElementById('editStoryArea')?.classList.add('hidden'); 
        }
        
        function loadAdminsList(){ database.ref('admins').on('value',(snapshot)=>{ const admins=snapshot.val(); const container=document.getElementById('adminsList'); if(container){ container.innerHTML='<h4>المشرفين الحاليين:</h4>'; if(admins) for(const[email] of Object.entries(admins)) container.innerHTML+=`<div class="user-item"><i class="fas fa-user-shield"></i> ${email.replace(/,/g,'.')}</div>`; else container.innerHTML+='<p>لا يوجد مشرفين</p>'; } }); }
        
        async function makeAdmin(){ 
            const email=document.getElementById('adminUserEmail')?.value; 
            if(!email) return; 
            await database.ref('admins/'+email.replace(/\./g,',')).set(true); 
            showAlert('تم تعيين المستخدم كأدمن','success'); 
            showNotification(`👑 تم تعيين ${email} كأدمن`);
            document.getElementById('adminUserEmail').value=''; 
        }
        
        async function removeAdmin(){ 
            const email=document.getElementById('adminUserEmail')?.value; 
            if(!email) return; 
            await database.ref('admins/'+email.replace(/\./g,',')).remove(); 
            const usersSnap = await database.ref('users').orderByChild('email').equalTo(email).once('value');
            usersSnap.forEach(async (userSnap) => {
                await database.ref('users/' + userSnap.key).update({ role: 'user' });
            });
            showAlert('تم إزالة الأدمن','success'); 
            showNotification(`⬇️ تم إزالة ${email} من المشرفين`);
            document.getElementById('adminUserEmail').value=''; 
        }
        
        function showAlert(msg,type){ const div=document.createElement('div'); div.className=`alert alert-${type}`; div.innerHTML=`<i class="fas ${type==='success'?'fa-check-circle':'fa-exclamation-circle'}"></i> ${msg}`; document.getElementById('app').prepend(div); setTimeout(()=>div.remove(),3000); }
        
        async function addDefaultStory(){ const snap=await database.ref('stories').once('value'); if(!snap.exists()) await database.ref('stories/story1').set({ title:"بداية الرحلة", topic:"قصة البداية", content:"مرحباً بك في منصة رواية.\n\nهذه هي قصتك الأولى.\n\nاستمتع برحلتك الأدبية!", lastEdited:Date.now(), editedBy:"system" }); }
        addDefaultStory();
    </script>
</body>
</html>
