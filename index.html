<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>شات حقيقي - أدمن وعادي | Firebase</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1e1e2f, #2d2d44);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #fff;
        }

        .chat-container {
            width: 500px;
            max-width: 95%;
            height: 90vh;
            background: rgba(30, 30, 46, 0.95);
            border-radius: 25px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            backdrop-filter: blur(5px);
        }

        .chat-header {
            background: #0f0f1a;
            padding: 20px;
            text-align: center;
            border-bottom: 2px solid #ff6b6b;
        }

        .chat-header h2 {
            font-size: 1.3rem;
            color: #ffd93d;
        }

        .chat-header p {
            font-size: 0.8rem;
            color: #aaa;
            margin-top: 5px;
        }

        .login-area, .admin-panel {
            padding: 15px;
            background: #252538;
            margin: 10px;
            border-radius: 20px;
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .login-area input, .admin-panel input {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 50px;
            background: #3a3a55;
            color: white;
            outline: none;
            font-size: 14px;
        }

        .login-area button, .admin-panel button {
            padding: 12px 20px;
            border: none;
            border-radius: 50px;
            background: #ff6b6b;
            color: white;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
        }

        .login-area button:hover, .admin-panel button:hover {
            background: #ff4757;
            transform: scale(1.02);
        }

        .admin-panel {
            background: #2a2a3c;
            border: 1px solid #ffb347;
        }

        .group-status {
            background: #1e1e2a;
            margin: 5px 10px;
            padding: 8px;
            text-align: center;
            border-radius: 15px;
            font-size: 0.8rem;
            font-weight: bold;
        }

        .messages-area {
            flex: 1;
            overflow-y: auto;
            padding: 15px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .message {
            background: #3a3a55;
            padding: 10px 15px;
            border-radius: 20px;
            max-width: 80%;
            word-wrap: break-word;
            animation: fadeIn 0.3s ease;
        }

        .message.own {
            align-self: flex-end;
            background: #ff6b6b;
        }

        .message .name {
            font-weight: bold;
            font-size: 0.8rem;
            color: #ffd93d;
            margin-bottom: 5px;
        }

        .message .text {
            font-size: 1rem;
        }

        .message .time {
            font-size: 0.65rem;
            color: #ccc;
            text-align: left;
            margin-top: 5px;
        }

        .message-input-area {
            padding: 15px;
            background: #1a1a2a;
            display: flex;
            gap: 10px;
            border-top: 1px solid #444;
        }

        .message-input-area input {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 50px;
            background: #3a3a55;
            color: white;
            outline: none;
        }

        .message-input-area button {
            padding: 12px 20px;
            background: #ff6b6b;
            border: none;
            border-radius: 50px;
            color: white;
            font-weight: bold;
            cursor: pointer;
        }

        .muted-warning {
            text-align: center;
            color: #ffaa66;
            font-size: 0.8rem;
            margin: 5px;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px);}
            to { opacity: 1; transform: translateY(0);}
        }
    </style>
</head>
<body>
<div class="chat-container">
    <div class="chat-header">
        <h2>💬 شات مباشر | أدمن + عادي</h2>
        <p>🚀 ريال تايم | 🔑 اكتب كود: <strong style="color:#ffd93d">#Admin123</strong> لتصبح أدمن</p>
    </div>

    <!-- منطقة تسجيل الدخول بالاسم -->
    <div class="login-area" id="loginArea">
        <input type="text" id="usernameInput" placeholder="أدخل اسمك... (مثلاً: أحمد)" maxlength="20">
        <button id="loginBtn">دخول للمحادثة 🚪</button>
    </div>

    <!-- لوحة تحكم الأدمن (تظهر فقط للمدير) -->
    <div class="admin-panel" id="adminPanel" style="display: none;">
        <input type="text" id="kickUserInput" placeholder="اسم العضو للطرد">
        <button id="kickBtn">👢 طرد العضو</button>
        <input type="text" id="muteUserInput" placeholder="اسم العضو للكتم">
        <button id="muteBtn">🔇 كتم العضو</button>
        <button id="unmuteAllBtn">🔊 فك الكتم عن الجميع</button>
        <button id="closeGroupBtn" style="background:#b33939;">🚫 قفل الجروب</button>
        <button id="openGroupBtn" style="background:#2ed573;">🔓 فتح الجروب</button>
    </div>

    <!-- حالة الجروب (مقفل/مفتوح) -->
    <div class="group-status" id="groupStatus">📡 جاري تحميل حالة الجروب...</div>

    <!-- مساحة الرسائل -->
    <div class="messages-area" id="messagesArea">
        <div style="text-align:center;color:#aaa;">✨ قم بتسجيل الدخول للمشاركة</div>
    </div>

    <!-- إرسال رسالة -->
    <div class="message-input-area" id="messageInputArea" style="display: none;">
        <input type="text" id="messageInput" placeholder="اكتب رسالتك...">
        <button id="sendBtn">إرسال 📨</button>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getDatabase, ref, push, onChildAdded, set, update, remove, get, onValue, child } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

    // إعداد Firebase - البيانات التي أعطيتها
    const firebaseConfig = {
        apiKey: "AIzaSyA74xI6RlWmOJSeE472TVMiGz2dC9rzbSU",
        authDomain: "tryy12345678.firebaseapp.com",
        databaseURL: "https://tryy12345678-default-rtdb.firebaseio.com",
        projectId: "tryy12345678",
        storageBucket: "tryy12345678.firebasestorage.app",
        messagingSenderId: "924494362795",
        appId: "1:924494362795:web:340d90c2e67a8e31139fee",
        measurementId: "G-C56N59JFK1"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    // المتغيرات العامة
    let currentUser = null;       // { name: "أحمد", isAdmin: false }
    let isGroupClosed = false;
    let mutedUsers = [];           // قائمة أسماء المكتمين

    // مراجع Firebase
    const messagesRef = ref(db, 'messages');
    const groupRef = ref(db, 'group/status');
    const mutedRef = ref(db, 'group/mutedUsers');

    // ======================== تحميل البيانات من فايربيز =======================
    // تحميل حالة الجروب (مقفل/مفتوح)
    onValue(groupRef, (snapshot) => {
        if (snapshot.exists()) {
            isGroupClosed = snapshot.val().closed === true;
        } else {
            isGroupClosed = false;
        }
        updateGroupStatusUI();
    });

    // تحميل قائمة المكتمين
    onValue(mutedRef, (snapshot) => {
        if (snapshot.exists()) {
            mutedUsers = snapshot.val().list || [];
        } else {
            mutedUsers = [];
        }
        updateMutedUI();
    });

    // تحديث واجهة حالة الجروب
    function updateGroupStatusUI() {
        const statusDiv = document.getElementById('groupStatus');
        if (isGroupClosed) {
            statusDiv.innerHTML = "🔴 الجروب مغلق ❌ | الأدمن فقط يمكنه الكتابة";
            statusDiv.style.background = "#4a1a2c";
        } else {
            statusDiv.innerHTML = "🟢 الجروب مفتوح ✅ | الجميع يكتبون (ما عدا المكتمين)";
            statusDiv.style.background = "#1e3a2e";
        }
    }

    function updateMutedUI() {
        if (currentUser && mutedUsers.includes(currentUser.name) && !currentUser.isAdmin) {
            document.getElementById('messageInputArea').style.display = "none";
            showSystemMessage("⚠️ لقد تم كتمك من قبل الأدمن لا يمكنك الكتابة.");
        } else if (currentUser) {
            if (!isGroupClosed || currentUser.isAdmin) {
                document.getElementById('messageInputArea').style.display = "flex";
            } else {
                document.getElementById('messageInputArea').style.display = "none";
            }
        }
    }

    // عرض رسائل النظام في منطقة الشات
    function showSystemMessage(text) {
        const messagesDiv = document.getElementById('messagesArea');
        const sysMsg = document.createElement('div');
        sysMsg.style.background = "#4a4a6a";
        sysMsg.style.textAlign = "center";
        sysMsg.style.fontSize = "12px";
        sysMsg.style.padding = "5px";
        sysMsg.style.borderRadius = "15px";
        sysMsg.style.margin = "5px";
        sysMsg.style.color = "#ffcc88";
        sysMsg.innerText = `🔔 ${text}`;
        messagesDiv.appendChild(sysMsg);
        messagesDiv.scrollTop = messagesDiv.scrollHeight;
        setTimeout(() => sysMsg.remove(), 4000);
    }

    // عرض رسائل الشات من Firebase في الوقت الحقيقي
    onChildAdded(messagesRef, (snapshot) => {
        const msg = snapshot.val();
        if (!msg) return;

        const messagesDiv = document.getElementById('messagesArea');
        // إزالة رسالة الترحيب الوهمية إذا وجدت
        if (messagesDiv.children.length === 1 && messagesDiv.children[0].innerText.includes("قم بتسجيل الدخول")) {
            messagesDiv.innerHTML = '';
        }

        const messageElement = document.createElement('div');
        messageElement.className = 'message';
        // إذا كان المرسل هو المستخدم الحالي
        if (currentUser && msg.sender === currentUser.name) {
            messageElement.classList.add('own');
        }

        const nameSpan = document.createElement('div');
        nameSpan.className = 'name';
        nameSpan.innerText = msg.sender + (msg.isAdmin ? " 👑 أدمن" : "");

        const textSpan = document.createElement('div');
        textSpan.className = 'text';
        textSpan.innerText = msg.text;

        const timeSpan = document.createElement('div');
        timeSpan.className = 'time';
        const date = new Date(msg.timestamp);
        timeSpan.innerText = date.toLocaleTimeString('ar-EG');

        messageElement.appendChild(nameSpan);
        messageElement.appendChild(textSpan);
        messageElement.appendChild(timeSpan);
        messagesDiv.appendChild(messageElement);
        messagesDiv.scrollTop = messagesDiv.scrollHeight;
    });

    // إرسال رسالة إلى Firebase
    async function sendMessage(text) {
        if (!currentUser) {
            alert("يجب تسجيل الدخول أولاً!");
            return false;
        }
        // التحقق من الكتم
        if (!currentUser.isAdmin && mutedUsers.includes(currentUser.name)) {
            showSystemMessage("🚫 لا تستطيع الكتابة لأنك مكتوم!");
            return false;
        }
        // التحقق من قفل الجروب
        if (isGroupClosed && !currentUser.isAdmin) {
            showSystemMessage("🔒 الجروب مغلق حاليًا، الأدمن فقط يمكنه الكتابة.");
            return false;
        }
        if (text.trim() === "") return false;

        const newMessage = {
            sender: currentUser.name,
            text: text,
            timestamp: Date.now(),
            isAdmin: currentUser.isAdmin
        };
        await push(messagesRef, newMessage);
        return true;
    }

    // وظائف الأدمن
    async function kickUser(username) {
        if (!currentUser || !currentUser.isAdmin) {
            alert("أنت لست أدمن!");
            return;
        }
        if (username === currentUser.name) {
            showSystemMessage("⚠️ لا يمكنك طرد نفسك!");
            return;
        }
        // إضافة رسالة طرد كنظام
        await push(messagesRef, {
            sender: "⚙️ النظام",
            text: `🚷 العضو "${username}" تم طرده من المجموعة بواسطة ${currentUser.name}`,
            timestamp: Date.now(),
            isAdmin: false
        });
        showSystemMessage(`تم طرد ${username}`);
        // لا يمكننا حذف المستخدم فعلياً من الداتا بيز (لأنه بدون حساب)، نضيفه في قائمة سوداء محلية عبر كتم تلقائي
        if (!mutedUsers.includes(username)) {
            mutedUsers.push(username);
            await set(mutedRef, { list: mutedUsers });
        }
    }

    async function muteUser(username) {
        if (!currentUser || !currentUser.isAdmin) {
            alert("أنت لست أدمن!");
            return;
        }
        if (mutedUsers.includes(username)) {
            showSystemMessage(`⚠️ ${username} مكتوم بالفعل`);
            return;
        }
        mutedUsers.push(username);
        await set(mutedRef, { list: mutedUsers });
        await push(messagesRef, {
            sender: "⚙️ النظام",
            text: `🔇 العضو "${username}" تم كتمه بواسطة ${currentUser.name}`,
            timestamp: Date.now(),
            isAdmin: false
        });
        showSystemMessage(`🔇 تم كتم ${username}`);
    }

    async function unmuteAll() {
        if (!currentUser || !currentUser.isAdmin) return;
        mutedUsers = [];
        await set(mutedRef, { list: [] });
        await push(messagesRef, {
            sender: "⚙️ النظام",
            text: `🔊 الأدمن ${currentUser.name} قام بفك الكتم عن الجميع`,
            timestamp: Date.now(),
            isAdmin: false
        });
        showSystemMessage("🔊 تم فك الكتم عن جميع الأعضاء");
    }

    async function closeGroup() {
        if (!currentUser || !currentUser.isAdmin) return;
        await set(groupRef, { closed: true });
        await push(messagesRef, {
            sender: "⚙️ النظام",
            text: `🔒 الأدمن ${currentUser.name} أغلق الجروب. لا يمكن لأي شخص عادي الكتابة.`,
            timestamp: Date.now(),
            isAdmin: false
        });
        showSystemMessage("🔒 الجروب مغلق الآن");
    }

    async function openGroup() {
        if (!currentUser || !currentUser.isAdmin) return;
        await set(groupRef, { closed: false });
        await push(messagesRef, {
            sender: "⚙️ النظام",
            text: `🔓 الأدمن ${currentUser.name} فتح الجروب. يمكن للجميع الكتابة الآن.`,
            timestamp: Date.now(),
            isAdmin: false
        });
        showSystemMessage("🔓 الجروب مفتوح الآن");
    }

    // التحول لأدمن عن طريق كود معين
    function checkForAdminCode(inputName) {
        // الكود السري هو #Admin123 (يمكن تغييره)
        if (inputName.includes("#Admin123")) {
            let cleanName = inputName.replace("#Admin123", "").trim();
            if (cleanName === "") cleanName = "أدمن";
            return { name: cleanName, isAdmin: true };
        }
        return { name: inputName.trim(), isAdmin: false };
    }

    // تسجيل الدخول
    function login() {
        const inputField = document.getElementById('usernameInput');
        let rawName = inputField.value;
        if (rawName.trim() === "") {
            alert("الرجاء إدخال اسم صالح");
            return;
        }
        const userData = checkForAdminCode(rawName);
        currentUser = userData;

        // إظهار/إخفاء لوحة الأدمن
        const adminPanel = document.getElementById('adminPanel');
        if (currentUser.isAdmin) {
            adminPanel.style.display = "flex";
            showSystemMessage(`👑 مرحباً الأدمن ${currentUser.name} ، يمكنك إدارة المجموعة!`);
        } else {
            adminPanel.style.display = "none";
            showSystemMessage(`👋 مرحباً ${currentUser.name} ، أنت مستخدم عادي.`);
        }

        // إخفاء منطقة تسجيل الدخول وإظهار الإرسال
        document.getElementById('loginArea').style.display = "none";
        document.getElementById('messageInputArea').style.display = "flex";

        // إضافة رسالة ترحيب في الشات
        push(messagesRef, {
            sender: "⚙️ النظام",
            text: `${currentUser.name} (${currentUser.isAdmin ? "أدمن" : "عادي"}) انضم إلى الدردشة 🎉`,
            timestamp: Date.now(),
            isAdmin: false
        });

        // تحديث واجهة الكتم
        updateMutedUI();
    }

    // تسجيل أحداث الأزرار
    document.getElementById('loginBtn').addEventListener('click', login);
    document.getElementById('sendBtn').addEventListener('click', async () => {
        const inputMsg = document.getElementById('messageInput');
        if (await sendMessage(inputMsg.value)) {
            inputMsg.value = "";
        } else {
            if (currentUser && (mutedUsers.includes(currentUser.name) && !currentUser.isAdmin)) {
                alert("أنت مكتوم ❌ لا يمكنك الإرسال");
            } else if (isGroupClosed && !currentUser?.isAdmin) {
                alert("الجروب مغلق مؤقتاً، فقط الأدمن يكتب.");
            }
        }
    });
    document.getElementById('messageInput').addEventListener('keypress', (e) => {
        if (e.key === 'Enter') document.getElementById('sendBtn').click();
    });

    // أزرار الأدمن
    document.getElementById('kickBtn').addEventListener('click', () => {
        const name = document.getElementById('kickUserInput').value.trim();
        if (name) kickUser(name);
        else alert("أدخل اسم العضو للطرد");
        document.getElementById('kickUserInput').value = '';
    });
    document.getElementById('muteBtn').addEventListener('click', () => {
        const name = document.getElementById('muteUserInput').value.trim();
        if (name) muteUser(name);
        else alert("أدخل اسم العضو للكتم");
        document.getElementById('muteUserInput').value = '';
    });
    document.getElementById('unmuteAllBtn').addEventListener('click', unmuteAll);
    document.getElementById('closeGroupBtn').addEventListener('click', closeGroup);
    document.getElementById('openGroupBtn').addEventListener('click', openGroup);

    // ضبط أولي للجروب إذا كانت القيم غير موجودة
    async function initializeData() {
        const groupSnap = await get(groupRef);
        if (!groupSnap.exists()) {
            await set(groupRef, { closed: false });
        }
        const mutedSnap = await get(mutedRef);
        if (!mutedSnap.exists()) {
            await set(mutedRef, { list: [] });
        }
    }
    initializeData();

    // إذا حاول المستخدم إرسال قبل تسجيل الدخول
    console.log("✅ شات فايربيز جاهز | الأدمن يظهر بالكود #Admin123");
</script>
</body>
</html>
